<script>
  // ===== 双语 SweetAlert helper（规范 §8） =====
  const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
  const swalHtml  = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

  // ===== 卡片 ID → 子页面 page key（与 Code.js doGet templateFiles 对齐） =====
  const PAGE_MAP = {
    modify: 'modify', create: 'create', void: 'void',
    approval_Production: 'Production_Approval', approval1: 'approve1', approval2: 'approve2',
    dissminater: 'dissminater', view: 'viewer', progress: 'progress',
    modify_IN: 'Inspection_Edit', create_IN: 'Inspection_Create', void_IN: 'Inspection_Void',
    approval_Production_IN: 'Inspection_Production_Approval', approval1_IN: 'Inspection_Approve1',
    approval2_IN: 'Inspection_Approve2', dissminater_IN: 'Inspection_Dissminater',
    view_IN: 'Inspection_View', progress_IN: 'Inspection_Progress'
  };

  const SS_KEY = 'tlmoc_session'; // sessionStorage key（只存工号/姓名，不存密码）

  let webUrl = '';      // Web App 部署地址
  let accounts = [];    // getPasswordData 返回的账号表
  let currentUser = null; // { jobNumber, name, authorization }

  $(document).ready(() => {
    Swal.fire({
      title: swalTitle('页面加载中', 'Page Loading'),
      html: swalHtml('正在获取数据，请稍候。', 'Fetching data, please wait.'),
      allowOutsideClick: false, showConfirmButton: false,
      didOpen: () => Swal.showLoading()
    });

    // 并行：部署地址（跳转用）
    google.script.run.withSuccessHandler((r) => { webUrl = r; }).getReleaseWebPage();

    // 并行：待办数量 Badge（审批进度）
    google.script.run.withSuccessHandler((r) => {
      if (r && r.pmCount > 0) { $('#badge_pm').text(r.pmCount).show(); $('#tabBadgePm').text(r.pmCount).show(); }
      if (r && r.inCount > 0) { $('#badge_in').text(r.inCount).show(); $('#tabBadgeIn').text(r.inCount).show(); }
    }).getPendingCountsForUser();

    // 账号表（登录校验用）
    google.script.run
      .withSuccessHandler((r) => {
        accounts = (r && r[0]) ? r[0] : [];
        Swal.close();
        // EDS 跨项目免密登录：URL 带凭据时自动校验登录
        if (!tryAutoLogin()) {
          restoreSession(); // 尝试从 sessionStorage 恢复登录态
        }
      })
      .withFailureHandler((err) => {
        Swal.fire({ icon: 'error', title: swalTitle('加载失败', 'Loading Fail'), html: swalHtml('请刷新重试。', String(err && err.message || err)) });
      })
      .getPasswordData();

    // 输入 5 位工号即回显姓名（不暴露权限）
    $('#jobNumber').on('input', function () {
      const acc = findAccount($(this).val());
      if (acc) { $('#nameEcho').show().find('span').text(acc.Name); }
      else { $('#nameEcho').hide(); }
    });

    $('#PWD').on('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
    $('#loginBtn').on('click', doLogin);
    $('#reloginBtn').on('click', logout);

    // 功能卡点击 → 跳转子页面（密码已在登录时校验）
    $('.nav-card').on('click', function () {
      if (!currentUser) { Swal.fire({ icon: 'warning', title: swalTitle('请先登录', 'Please log in first') }); return; }
      const pageKey = PAGE_MAP[this.id];
      if (!pageKey) return;
      if (!webUrl) { Swal.fire({ icon: 'info', title: swalTitle('地址加载中，请稍候', 'Loading URL, please wait') }); return; }
      let url = webUrl + '?page=' + encodeURIComponent(pageKey)
        + '&jobNumber=' + encodeURIComponent(currentUser.jobNumber)
        + '&name=' + encodeURIComponent(currentUser.name);
      window.open(url);
    });
  });

  // EDS 跨项目免密登录：读取服务端注入的 URL 参数自动登录
  function tryAutoLogin() {
    const jn = (typeof TLMOC_URL_JN !== 'undefined') ? TLMOC_URL_JN : '';
    const pw = (typeof TLMOC_URL_PWD !== 'undefined') ? TLMOC_URL_PWD : '';
    if (!jn || !pw) return false;
    const acc = findAccount(jn);
    if (!acc || String(pw) !== String(acc.PWD)) return false;
    enterWorkspace({ jobNumber: jn, name: acc.Name, authorization: acc.Authorization });
    try { sessionStorage.setItem(SS_KEY, JSON.stringify({ jobNumber: jn, name: acc.Name })); } catch (e) {}
    return true;
  }

  // 按工号查账号（兼容 JobNumber 为数字或字符串）
  function findAccount(jn) {
    const key = String(jn || '').trim();
    if (key.length !== 5) return null;
    return accounts.find((a) => String(a.JobNumber).trim() === key) || null;
  }

  function doLogin() {
    const jn = String($('#jobNumber').val() || '').trim();
    const acc = findAccount(jn);
    if (!acc) { Swal.fire({ icon: 'warning', title: swalTitle('工号不存在', 'Job number not found') }); return; }
    if (String($('#PWD').val()) !== String(acc.PWD)) {
      Swal.fire({ icon: 'error', title: swalTitle('密码错误', 'Password Error') });
      return;
    }
    enterWorkspace({ jobNumber: jn, name: acc.Name, authorization: acc.Authorization });
    try { sessionStorage.setItem(SS_KEY, JSON.stringify({ jobNumber: jn, name: acc.Name })); } catch (e) {}
  }

  function logout() {
    currentUser = null;
    try { sessionStorage.removeItem(SS_KEY); } catch (e) {}
    $('#workspace').hide();
    $('#loginCard').show();
    $('#jobNumber, #PWD').val('');
    $('#nameEcho').hide();
  }

  // 刷新后从 sessionStorage 恢复，权限实时从 accounts 重新取（保证最新）
  function restoreSession() {
    let saved = null;
    try { saved = JSON.parse(sessionStorage.getItem(SS_KEY) || 'null'); } catch (e) {}
    if (!saved || !saved.jobNumber) return;
    const acc = findAccount(saved.jobNumber);
    if (!acc) { try { sessionStorage.removeItem(SS_KEY); } catch (e) {} return; }
    enterWorkspace({ jobNumber: String(saved.jobNumber).trim(), name: acc.Name, authorization: acc.Authorization });
  }

  // 进入工作区：按权限渲染卡片
  function enterWorkspace(user) {
    currentUser = user;
    const perms = String(user.authorization || '').split(',').map((s) => s.trim()).filter(Boolean);

    let pmCount = 0, inCount = 0;
    $('.fn-col').each(function () {
      const need = $(this).data('perm');
      const ok = need === '*' || perms.includes(String(need));
      $(this).toggle(ok);
      if (ok) { ($(this).closest('#pmGrid').length ? pmCount++ : inCount++); }
    });
    // 仅剩“审批进度”一张卡 → 提示无操作权限
    $('#pmEmpty').toggle(pmCount <= 1);
    $('#inEmpty').toggle(inCount <= 1);

    $('#uName').text(user.name);
    $('#uPerm').text('已登录 / ' + perms.length + ' 项权限');
    $('#loginCard').hide();
    $('#workspace').show();
  }
</script>

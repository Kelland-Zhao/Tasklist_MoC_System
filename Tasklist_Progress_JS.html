<script>
  $(document).ready(() => {
    let title = $('#title').text();
    let styledText1 = '<span style="color: red; font-weight: bold;">дҝқе…»</span>';
    let styledText2 = '<span style="color: red; font-weight: bold;font-style:italic;">PM</span>';
    let newText = title.replace('дҝқе…»', styledText1).replace('PM', styledText2);
    $('#title').html(newText)

    Swal.fire({
      title: 'йЎөйқўеҠ иҪҪдёӯ/ Page Loading',
      text: 'йЎөйқўеҠ иҪҪдёӯпјҢиҜ·зЁҚеҗҺ.../ Page loading, please wait...',
      icon: 'info',
      allowOutsideClick: false,
      showConfirmButton: false
    })

    var emailConfig = [];
    var table = $('#table').DataTable({
      columns: [
        { data: 'MachineType' },
        { data: 'Operator' },
        { data: 'Reason' },
        { data: 'Production Approval (Y/N)' },
        { data: null, defaultContent: '' },
        { data: 'Status' },
        { data: 'submitMail' }
      ],
      autoWidth: false,
      scrollX: true,
      columnDefs: [
        { targets: 0, width: '100px' },
        { targets: 1, width: '100px' },
        { targets: 2, width: '100px' },
        { targets: 3, width: '100px' },
        { targets: 4, width: 'auto', createdCell: function(td) { $(td).css('background-color', '#eaf3ff'); } },
        { targets: 5, width: '100px' },
        { targets: 6, width: '100px' },
        { targets: 7, width: '100px' },
        { targets: 1, render: function(data, type, row, meta) {
          if (type === 'display') return '<span style="font-size:0.75em;">' + (data || '') + '</span>';
          return data;
        }},
        { targets: 6, render: function(data, type, row, meta) {
          if (type === 'display') return '<span style="font-size:0.75em;">' + (data || '') + '</span>';
          return data;
        }},
        {
          targets: 3, // Production Approval (Y/N)еҲ— (зҙўеј•3)
          render: function (data, type, row, meta) {
            if (type === 'display') {
              let approval = data;
              let badgeClass = '';
              
              if (approval === 'Y') {
                badgeClass = 'bg-primary';
              } else if (approval === 'N') {
                badgeClass = 'bg-secondary';
              } else {
                badgeClass = 'bg-secondary';
              }
              
              return '<span class="badge ' + badgeClass + ' d-flex justify-content-center">' + approval + '</span>';
            }
            return data;
          }
        },
        {
          targets: 4, // е®Ўжү№жөҒзЁӢеҲ— (зҙўеј•4)
          render: function (data, type, row, meta) {
            if (type !== 'display') return '';
            function parseApprover(val) {
              if (!val || !val.trim()) return null;
              var action = '', name = '', date = '';
              if (val.includes('жү№еҮҶдҪңеәҹ')) action = 'жү№еҮҶдҪңеәҹ';
              else if (val.includes('жү№еҮҶ')) action = 'жү№еҮҶ';
              else if (val.includes('жӢ’з»қ')) action = 'жӢ’з»қ';
              else action = val.substring(0, 4);
              var emailMatch = val.match(/[\w.]+@[\w.]+/);
              if (emailMatch) name = emailMatch[0].split('@')[0];
              var dateMatch = val.match(/\d{4}-\d{2}-\d{2}/);
              if (dateMatch) date = dateMatch[0];
              return { action: action, name: name, date: date };
            }
            function getPendingApprover(machineType, key) {
              var item = null;
              for (var j = 0; j < emailConfig.length; j++) {
                if (emailConfig[j].MachineType === machineType) { item = emailConfig[j]; break; }
              }
              if (!item) return '';
              var email = '';
              if (key === 'lv1') email = item['Mail_Approve1'] || '';
              else if (key === 'lv2') email = item['Mail_Approve2'] || '';
              else if (key === 'dis') email = item['Mail_Disseninate'] || '';
              return email ? email.split('@')[0] : '';
            }
            var steps = [
              { skip: row['Production Approval (Y/N)'] === 'N', parsed: parseApprover(row['Production Approver']), label: 'зҸӯз»„', key: 'prod' },
              { skip: false, parsed: parseApprover(row['Approver1']), label: 'е®Ў1', key: 'lv1' },
              { skip: false, parsed: parseApprover(row['Approver2']), label: 'е®Ў2', key: 'lv2' },
              { skip: false, parsed: parseApprover(row['Dissminater']), label: 'еҸ‘еёғ', key: 'dis' }
            ];
            var foundCurrent = false;
            for (var i = 0; i < steps.length; i++) {
              if (!foundCurrent && !steps[i].skip && !steps[i].parsed) {
                steps[i].isCurrent = true;
                foundCurrent = true;
              }
            }
            var arrow = '<span style="color:#ccc;font-size:14px;padding-top:4px;flex-shrink:0;">&#9658;</span>';
            var html = '<div style="display:flex;align-items:flex-start;flex-wrap:nowrap;width:100%;gap:2px;">';
            for (var i = 0; i < steps.length; i++) {
              var step = steps[i];
              var badge, line1, line2;
              if (step.skip) {
                badge = '<div style="background:#6c757d;color:#fff;border-radius:4px;padding:4px 0;font-size:12px;font-weight:600;width:100%;">N/A</div>';
                line1 = ''; line2 = '';
              } else if (step.parsed) {
                var bg = step.parsed.action.includes('жӢ’з»қ') ? '#dc3545' : '#198754';
                badge = '<div style="background:' + bg + ';color:#fff;border-radius:4px;padding:4px 0;font-size:12px;font-weight:600;width:100%;">' + step.parsed.action + '</div>';
                line1 = '<small style="font-size:11px;color:#555;">' + step.parsed.name + '</small>';
                line2 = '<small style="font-size:11px;color:#888;">' + step.parsed.date + '</small>';
              } else if (step.isCurrent) {
                var approver = getPendingApprover(row['MachineType'], step.key);
                badge = '<div style="background:#ffc107;color:#333;border-radius:4px;padding:4px 0;font-size:12px;font-weight:600;width:100%;">еҫ…е®Ўжү№</div>';
                line1 = '<small style="font-size:11px;color:#555;">' + (approver || step.label) + '</small>';
                line2 = '';
              } else {
                badge = '<div style="background:#dee2e6;color:#aaa;border-radius:4px;padding:4px 0;font-size:12px;font-weight:600;width:100%;">еҫ…</div>';
                line1 = '<small style="font-size:11px;color:#ccc;">' + step.label + '</small>';
                line2 = '';
              }
              html += '<div style="flex:1;text-align:center;">' + badge + (line1 ? '<br>' + line1 : '') + (line2 ? '<br>' + line2 : '') + '</div>';
              if (i < steps.length - 1) html += arrow;
            }
            html += '</div>';
            return html;
          }
        },
        {
          targets: 5, // StatusеҲ— (зҙўеј•5)
          render: function (data, type, row, meta) {
            if (type === 'display') {
              let status = data;
              let badgeClass = '';
              
              if (status === 'еҫ…е®Ўжү№/ Pending') {
                badgeClass = 'bg-warning text-dark';
              } else if (status === 'дҪңеәҹеҫ…е®Ўжү№/ Void Pending') {
                badgeClass = 'bg-danger';
              } else if (status === 'жӢ’з»қ/ Rejected') {
                badgeClass = 'bg-danger';
              } else if (status === 'з”ҹж•Ҳ/ Effective') {
                badgeClass = 'bg-success';
              } else if (status === 'еҸ–д»Ј/ Replace') {
                badgeClass = 'bg-secondary';
              } else if (status === 'дҪңеәҹ/ Void') {
                badgeClass = 'bg-dark';
              } else {
                badgeClass = 'bg-secondary';
              }
              
              var parts = status.split('/ ');
              var cn = parts[0] || status;
              var en = parts.slice(1).join('/ ') || '';
              return '<div class="badge ' + badgeClass + '" style="display:flex;flex-direction:column;align-items:center;line-height:1.3;white-space:normal;"><span>' + cn + '</span>' + (en ? '<small style="font-size:0.8em;">' + en + '</small>' : '') + '</div>';
            }
            return data;
          }
        },
        {
          targets: 2, // еҸҳжӣҙеҺҹеӣ еҲ— (зҙўеј•2)
          render: function (data, type, row, meta) {
            if (type === 'display') {
              let reason = data;
              // жҸҗеҸ–дё»иҰҒеҸҳжӣҙеҺҹеӣ пјҲ"еҸҳжӣҙеҺҹеӣ / Reason for change:"еҗҺйқўзҡ„еҶ…е®№пјү
              let mainReason = '';
              if (reason && reason.includes('еҸҳжӣҙеҺҹеӣ / Reason for change:')) {
                let parts = reason.split('еҸҳжӣҙеҺҹеӣ / Reason for change:');
                if (parts.length > 1) {
                  let afterReason = parts[1].trim();
                  // жҹҘжүҫ"ж–°еўһжқЎзӣ®ж•°"зҡ„дҪҚзҪ®пјҢеҸ–"ж–°еўһжқЎзӣ®ж•°"еүҚзҡ„еҶ…е®№дҪңдёәдё»иҰҒеҸҳжӣҙеҺҹеӣ 
                  let addIndex = afterReason.indexOf('ж–°еўһжқЎзӣ®ж•°');
                  if (addIndex > 0) {
                    mainReason = afterReason.substring(0, addIndex).trim();
                  } else {
                    // еҰӮжһңжІЎжңү"ж–°еўһжқЎзӣ®ж•°"пјҢеҸ–з¬¬дёҖдёӘз©әж јеүҚзҡ„еҶ…е®№
                    let firstSpaceIndex = afterReason.indexOf(' ');
                    if (firstSpaceIndex > 0) {
                      mainReason = afterReason.substring(0, firstSpaceIndex);
                    } else {
                      mainReason = afterReason;
                    }
                  }
                }
              } else {
                mainReason = reason;
              }
              
                             return '<span class="badge bg-info d-flex justify-content-center" style="min-width: 80px;">' + mainReason + '</span> <span class="badge bg-warning text-dark ms-2" style="cursor:pointer;min-width:80px;display:flex;flex-direction:column;align-items:center;line-height:1.3;"><span>иҜҰжғ…</span><small style="font-size:0.8em;">Details</small></span>';
            }
            return data;
          }
        },
        {
          targets: 7, // д»»еҠЎжё…еҚ•еҲ— (зҙўеј•7)
          render: function (data, type, row, meta) {
            return '<button class="btn btn-info btn-sm">д»»еҠЎжё…еҚ•/ Detail Tasklist</button>';
          }
        }
      ],
      pageLength: 25
    });

    google.script.run.withSuccessHandler((r) => {
      if (r.length === 4) {
        Swal.close();
        Swal.fire({
          title: 'еҠ иҪҪжҲҗеҠҹ/ Loading Success',
          icon: 'success'
        })
        
        let objArrayApprovallist = r[0];
        let objArrayEmail = r[1];
        emailConfig = objArrayEmail;
        let mail = r[2];

        // зӯӣйҖүжӯЈеңЁе®Ўжү№иҝҮзЁӢдёӯзҡ„д»»еҠЎпјҲжҺ’йҷӨе·Іе®ҢжҲҗзҠ¶жҖҒгҖҒжӢ’з»қзҠ¶жҖҒе’ҢиЎЁеӨҙиЎҢпјү
        let progressItems = objArrayApprovallist.filter((r) => {
          // жҺ’йҷӨиЎЁеӨҙиЎҢпјҲйҖҡеёёиЎЁеӨҙиЎҢзҡ„Statusеӯ—ж®өдёәз©әжҲ–еҢ…еҗ«иЎЁеӨҙдҝЎжҒҜпјү
          if (!r.Status || r.Status.includes('зҠ¶жҖҒ') || r.Status.includes('Status')) {
            return false;
          }
          
          return r.Status !== "з”ҹж•Ҳ/ Effective" 
            && r.Status !== "еҸ–д»Ј/ Replace" 
            && r.Status !== "дҪңеәҹ/ Void"
            && r.Status !== "жӢ’з»қ/ Rejected";
        });

        console.log('progressItems', progressItems);

        if (progressItems.length === 0) {
          Swal.fire({
            title: 'жІЎжңүжӯЈеңЁе®Ўжү№зҡ„еҶ…е®№',
            text: 'No content is currently under approval',
            icon: 'info',
            confirmButtonText: 'зЎ®е®ҡ/ OK'
          });
        } else {
          table.clear().draw();
          table.rows.add(progressItems).draw();
        }

        $("#Name").text(mail);

        let tableHTML = '<table id="diffTable" class="display" style="width:100%">';
        tableHTML += "<thead>"
        tableHTML += "<tr>"
        tableHTML += "<th>жңәеһӢ/ Machine Type</th>"
        tableHTML += "<th>д»»еҠЎзј–еҸ·/ Task No.</th>"
        tableHTML += "<th>еҚ•е…ғ/ Section</th>"
        tableHTML += "<th>еҠҹиғҪ/ Function</th>"
        tableHTML += "<th>еӨұж•ҲжЁЎејҸ/ Failure Mode</th>"
        tableHTML += "<th>д»»еҠЎзұ»еһӢ/ Task Type</th>"
        tableHTML += "<th>д»»еҠЎжҸҸиҝ°/ Task Description</th>"
        tableHTML += "<th>йў‘зҺҮ/ Frecuency</th>"
        tableHTML += "<th>и®ҫеӨҮзҠ¶жҖҒ/ Line Status</th>"
        tableHTML += "<th>дҝқе…»зӯ–з•Ҙ/ Strategy</th>"
        tableHTML += "<th>жү§иЎҢдәә/ Resource</th>"
        tableHTML += "<th>дәәж•°/ No. Resources</th>"
        tableHTML += "<th>жҠҖиғҪзӯүзә§/ Skill Level</th>"
        tableHTML += "<th>жҠҖиғҪ/ Tools & Equip</th>"
        tableHTML += "<th>йў„дј°ж—¶й—ҙ/ Estimated Time</th>"
        tableHTML += "</tr>"
        tableHTML += "</thead>"
        tableHTML += "</table>"

        $("#table tbody").on('click', '.btn-info', function () {
          Swal.fire({
            title: 'д»»еҠЎжё…еҚ•/ Tasklist',
            html: tableHTML,
            height: '90%',
            width: '90%'
          });
          
          let rowData = table.row($(this).closest('tr')).data();
          let editor = rowData['Operator'];
          let item = r[0].filter((r) => { return r.Operator == editor });
          let tasklist = JSON.parse(item[0].Tasklist);

          let diffTable = $('#diffTable').DataTable({
            columns: [
              { data: 'MachineType' },
              { data: 'Task No' },
              { data: 'Section' },
              { data: 'Function' },
              { data: 'Failure Mode' },
              { data: 'Task Type' },
              { data: 'Task Description' },
              { data: 'Frecuency' },
              { data: 'Line Status' },
              { data: 'Strategy' },
              { data: 'Resource' },
              { data: 'No Resources' },
              { data: 'Skill Level' },
              { data: 'Tools & Equip' },
              { data: 'Estimated Time' }
            ],
            pageLength: 100
          });
          
          diffTable.clear().rows.add(tasklist).draw();
        });

                 // еҸҳжӣҙеҺҹеӣ иҜҰжғ…жҢүй’®зӮ№еҮ»дәӢд»¶
         $("#table tbody").on('click', '.bg-warning', function () {
           let rowData = table.row($(this).closest('tr')).data();
           let reason = rowData['Reason'];
           
           // и§ЈжһҗеҸҳжӣҙеҺҹеӣ еҶ…е®№пјҢжҸҗеҸ–еҗ„дёӘйғЁеҲҶ
           let reasonParts = {};
           if (reason && reason.includes('еҸҳжӣҙеҺҹеӣ / Reason for change:')) {
             let parts = reason.split('еҸҳжӣҙеҺҹеӣ / Reason for change:');
             if (parts.length > 1) {
               let afterReason = parts[1].trim();
               
               // жҸҗеҸ–дё»иҰҒеҸҳжӣҙеҺҹеӣ 
               let addIndex = afterReason.indexOf('ж–°еўһжқЎзӣ®ж•°');
               if (addIndex > 0) {
                 reasonParts['mainReason'] = afterReason.substring(0, addIndex).trim();
               } else {
                 reasonParts['mainReason'] = afterReason;
               }
               
               // жҸҗеҸ–ж–°еўһжқЎзӣ®ж•°
               let addMatch = afterReason.match(/ж–°еўһжқЎзӣ®ж•°\/ Number of add: (\d+)/);
               if (addMatch) {
                 reasonParts['addCount'] = addMatch[1];
               }
               
               // жҸҗеҸ–еҲ йҷӨжқЎзӣ®ж•°
               let deleteMatch = afterReason.match(/еҲ йҷӨжқЎзӣ®ж•°\/ Number of delete: (\d+)/);
               if (deleteMatch) {
                 reasonParts['deleteCount'] = deleteMatch[1];
               }
               
               // жҸҗеҸ–дҝ®ж”№жқЎзӣ®ж•°
               let editMatch = afterReason.match(/дҝ®ж”№жқЎзӣ®ж•°\/ Number of edit: (\d+)/);
               if (editMatch) {
                 reasonParts['editCount'] = editMatch[1];
               }
             }
           }
           
                       // жһ„е»әиЎЁж јHTML
            let tableHTML = '<table class="table table-bordered table-striped">';
            tableHTML += '<thead><tr><th>йЎ№зӣ®/ Item</th><th>еҶ…е®№/ Content</th></tr></thead>';
            tableHTML += '<tbody>';
            tableHTML += '<tr><td>дё»иҰҒеҸҳжӣҙеҺҹеӣ / Main Reason</td><td>' + (reasonParts['mainReason'] || '') + '</td></tr>';
            if (reasonParts['addCount']) {
              tableHTML += '<tr><td>ж–°еўһжқЎзӣ®ж•°/ Number of Add</td><td>' + reasonParts['addCount'] + '</td></tr>';
            }
            if (reasonParts['deleteCount']) {
              tableHTML += '<tr><td>еҲ йҷӨжқЎзӣ®ж•°/ Number of Delete</td><td>' + reasonParts['deleteCount'] + '</td></tr>';
            }
            if (reasonParts['editCount']) {
              tableHTML += '<tr><td>дҝ®ж”№жқЎзӣ®ж•°/ Number of Edit</td><td>' + reasonParts['editCount'] + '</td></tr>';
            }
            tableHTML += '</tbody></table>';
           
           Swal.fire({
             title: 'еҸҳжӣҙеҺҹеӣ иҜҰжғ…/ Change Reason Details',
             html: tableHTML,
             width: '80%',
             confirmButtonText: 'зЎ®е®ҡ/ OK'
           });
         });

      } else {
        Swal.close();
        Swal.fire({
          title: 'еҠ иҪҪеӨұиҙҘ/ Loading Fail',
          icon: 'error'
        });
      }
    }).getApprovaldata();
  });
</script>

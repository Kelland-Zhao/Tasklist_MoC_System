<script>
    $(document).ready(() => {
      let title = $('#title').text();
      let styledText1 = '<span style="color: red; font-weight: bold;">保养</span>';
      let styledText2 = '<span style="color: red; font-weight: bold;font-style:italic;">PM</span>';
      let newText = title.replace('保养', styledText1).replace('PM', styledText2);
      $('#title').html(newText)
      Swal.fire({
        title: "页面加载中/ Page Loading",
        text: "页面加载中，请稍后.../ Page loading, please wait...",
        icon: "info",
        allowOutsideClick: false,
        showConfirmButton: false,
      });
      //DataTables初始化
      var table = $("#table").DataTable({
        columns: [
          { data: "MachineType" },
          { data: "Task No" },
          { data: "Section" },
          { data: "Function" },
          { data: "Failure Mode" },
          { data: "Task Type" },
          { data: "Task Description" },
          { data: "Frecuency" },
          { data: "Line Status" },
          { data: "Strategy" },
          { data: "Resource" },
          { data: "No Resources" },
          { data: "Skill Level" },
          { data: "Tools & Equip" },
          { data: "Estimated Time" },
          { data: "PdM?" },
          { data: "Unit" },
          { data: "Component" },
          { data: "Logic" },
          { data: "TagName" },
          { data: "LL Limited" },
          { data: "HH Limited" },
        ],
        columnDefs: [
          {
            targets: 8, // 设备状态/ Line Status列
            render: function (data, type, row, meta) {
              let options = [
                "停机",
                "开机",
                "停/ 开机"
              ];
              let selectHtml = '<select class="form-select form-select-sm line-status-select" style="width: 100%;">';
              selectHtml += '<option value="">请选择/ Please select</option>';
              options.forEach(function(option) {
                let selected = (data === option) ? 'selected' : '';
                selectHtml += '<option value="' + option + '" ' + selected + '>' + option + '</option>';
              });
              selectHtml += '</select>';
              return selectHtml;
            },
          },
          {
            targets: 9, // 保养策略/ Strategy列
            render: function (data, type, row, meta) {
              let options = [
                "预防性/ Preventive",
                "预测性/ Predictive"
              ];
              // 清理数据值，去除首尾空格
              let dataValue = (data || "").toString().trim();
              let matchedOption = null;
              
              // 如果数据有值，尝试匹配选项
              if (dataValue) {
                options.forEach(function(option) {
                  // 精确匹配
                  if (dataValue === option) {
                    matchedOption = option;
                  } 
                  // 部分匹配：检查是否包含中文或英文部分
                  else if (!matchedOption) {
                    if ((dataValue.includes("预防性") || dataValue.includes("Preventive")) &&
                        (option.includes("预防性") || option.includes("Preventive"))) {
                      matchedOption = option;
                    } else if ((dataValue.includes("预测性") || dataValue.includes("Predictive")) &&
                               (option.includes("预测性") || option.includes("Predictive"))) {
                      matchedOption = option;
                    }
                  }
                });
              }
              
              // 如果没有匹配到，默认使用第一个选项
              if (!matchedOption) {
                matchedOption = options[0];
              }
              
              // 生成下拉框HTML
              let selectHtml = '<select class="form-select form-select-sm strategy-select" style="width: 100%;">';
              options.forEach(function(option) {
                let selected = (option === matchedOption) ? 'selected' : '';
                selectHtml += '<option value="' + option + '" ' + selected + '>' + option + '</option>';
              });
              selectHtml += '</select>';
              
              return selectHtml;
            },
          },
          {
            targets: 10, // 执行人/ Resource列
            render: function (data, type, row, meta) {
              let options = [
                "技术员",
                "操作员"
              ];
              let selectHtml = '<select class="form-select form-select-sm resource-select" style="width: 100%;">';
              selectHtml += '<option value="">请选择/ Please select</option>';
              options.forEach(function(option) {
                let selected = (data === option) ? 'selected' : '';
                selectHtml += '<option value="' + option + '" ' + selected + '>' + option + '</option>';
              });
              selectHtml += '</select>';
              return selectHtml;
            },
          },
          {
            targets: 15, // 预测性？/ PdM?列
            render: function (data, type, row, meta) {
              // 使用时间戳和随机数生成唯一ID，避免行索引变化问题
              let uniqueId = meta.row + "_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
              let isYes = data === "是/ Yes" || data === "是" || data === true || data === "Yes";
              let radioName = "pdm_" + uniqueId;
              return '<div class="form-check form-check-inline">' +
                '<input class="form-check-input pdm-radio" type="radio" name="' + radioName + '" id="' + radioName + '_yes" value="是/ Yes" ' + (isYes ? 'checked' : '') + '>' +
                '<label class="form-check-label" for="' + radioName + '_yes">是/ Yes</label>' +
                '</div>' +
                '<div class="form-check form-check-inline">' +
                '<input class="form-check-input pdm-radio" type="radio" name="' + radioName + '" id="' + radioName + '_no" value="否/ No" ' + (!isYes ? 'checked' : '') + '>' +
                '<label class="form-check-label" for="' + radioName + '_no">否/ No</label>' +
                '</div>';
            },
          },
          {
            targets: 18, // Logic列
            render: function (data, type, row, meta) {
              let pdmValue = row["PdM?"];
              let isEditable = pdmValue === "是/ Yes";
              
              if (isEditable) {
                // 可编辑时显示下拉框
                let options = [
                  "HighAlarm_Max",
                  "HiighAlarm_Min",
                  "HighAlarm_Average",
                  "HighAlarm_Slope",
                  "LowAlarm_Max",
                  "LowAlarm_Min",
                  "LowAlarm_Average",
                  "LowAlarm_Slope",
                  "Out_of_range"
                ];
                let selectHtml = '<select class="form-select form-select-sm logic-select" style="width: 100%;">';
                selectHtml += '<option value="">请选择/ Please select</option>';
                options.forEach(function(option) {
                  let selected = (data === option) ? 'selected' : '';
                  selectHtml += '<option value="' + option + '" ' + selected + '>' + option + '</option>';
                });
                selectHtml += '</select>';
                return selectHtml;
              } else {
                // 不可编辑时显示文本
                return '<span class="non-editable-cell" style="background-color: #e9ecef; cursor: not-allowed;">' + (data || "") + '</span>';
              }
            },
          },
          {
            targets: [16, 17, 19, 20, 21], // Unit, Component, TagName, LL Limited, HH Limited
            render: function (data, type, row, meta) {
              let pdmValue = row["PdM?"];
              let isEditable = pdmValue === "是/ Yes";
              let cellClass = isEditable ? "editable-cell" : "non-editable-cell";
              let cellStyle = isEditable ? "" : "background-color: #e9ecef; cursor: not-allowed;";
              return '<span class="' + cellClass + '" style="' + cellStyle + '">' + (data || "") + '</span>';
            },
          },
          {
            targets: [15, 16, 17, 18, 19, 20, 21], // 预测性？/ PdM? 到 HH Limited列
            createdCell: function (td, cellData, rowData, row, col) {
              // 对于索引16-21的列，如果不可编辑则保持灰色，否则使用黄色高亮
              if (col >= 16 && col <= 21) {
                let pdmValue = rowData["PdM?"];
                let isEditable = pdmValue === "是/ Yes";
                if (!isEditable) {
                  // 不可编辑时保持灰色背景
                  $(td).css('background-color', '#e9ecef');
                } else {
                  // 可编辑时使用黄色高亮
                  $(td).css('background-color', '#fff3cd');
                }
              } else {
                // 索引15（PdM?列）使用黄色高亮
                $(td).css('background-color', '#fff3cd');
              }
            }
          },
          {
            targets: 22, // 表示最后一列（功能/ Option）
            render: function (data, type, row, meta) {
              return '<button class="btn btn-danger btn-sm">删除/ Delete</button>';
            },
          },
        ],
        pageLength: 100,
      });
  
      google.script.run.withSuccessHandler((result) => {
  
        if (result.length === 2) {
          Swal.close();
          Swal.fire({
            title: "加载成功/ Loading Success",
            icon: "success",
          });
  
          // console.log("result", result);
  
                    let userEmail = result[1];
          let data = result[0];

          // 过滤机型数据，排除状态为"作废/ Void"的记录
          let availableOptions = [];
          let optionSet = new Set(); // 用于去重

          data.forEach((r) => {
            // 只显示状态为"生效/ Effective"的数据
            if (r['Status'] === '生效/ Effective' && r['MachineType'] && r['Process']) {
              // 以 "Process - MachineType" 格式组合
              let optionText = `${r['Process']} - ${r['MachineType']}`;
              let optionValue = r['MachineType']; // 保持原有的value值用于后续逻辑
              optionSet.add(JSON.stringify({text: optionText, value: optionValue}));
            }
          });

          // 转换为数组并排序
          availableOptions = Array.from(optionSet).map(item => JSON.parse(item)).sort((a, b) => {
            // 按Process排序，然后按MachineType排序
            if (a.text.split(' - ')[0] !== b.text.split(' - ')[0]) {
              return a.text.split(' - ')[0].localeCompare(b.text.split(' - ')[0]);
            }
            return a.text.split(' - ')[1].localeCompare(b.text.split(' - ')[1]);
          });

          // 动态生成机型选择下拉框
          let machineTypeSelect = $('#MachineType');
          machineTypeSelect.empty(); // 清空现有选项
          
          // 添加默认选项
          machineTypeSelect.append('<option selected disabled>机型选择/ Machine Type</option>');
          
          // 添加过滤后的选项
          availableOptions.forEach((option) => {
            machineTypeSelect.append(`<option value="${option.value}">${option.text}</option>`);
          });

          $("#Confirm").click(() => {

            let MachineType = $("#MachineType").val();

            // 使用已有的 data 数据检查待审批状态
            let hasPendingApproval = data.some((r) => {
              return r.MachineType === MachineType && r.Status === "待审批/ Pending";
            });
            
            if (hasPendingApproval) {
              Swal.fire({
                title: '无法编辑/ Cannot Edit',
                text: '该机型已有未完成的审批申请，无法再次提交修改申请。如需提交新的修改申请，请先完成上一次的审批流程。',
                icon: 'warning',
                confirmButtonText: '确定/ OK',
                showCancelButton: false
              });
              return;
            }

            // 如果没有待审批申请，继续原有逻辑
            let Tasklist = [];
            let process = "";

            console.log("Tasklist History", data);

            data.forEach((r) => {
              if (r.MachineType == MachineType && r.Status == "生效/ Effective") {
                Tasklist.push(JSON.parse(r.Tasklist));
                process = r.Process;
              }
            });

            console.log("Process", process);

            // 确保所有行都包含新添加的字段
            if (Tasklist[0] && Tasklist[0].length > 0) {
              Tasklist[0].forEach(function(row) {
                // 如果字段不存在，添加默认值
                if (!row.hasOwnProperty("PdM?")) {
                  row["PdM?"] = "否/ No";
                }
                if (!row.hasOwnProperty("Unit")) {
                  row["Unit"] = "";
                }
                if (!row.hasOwnProperty("Component")) {
                  row["Component"] = "";
                }
                if (!row.hasOwnProperty("Logic")) {
                  row["Logic"] = "";
                }
                if (!row.hasOwnProperty("TagName")) {
                  row["TagName"] = "";
                }
                if (!row.hasOwnProperty("LL Limited")) {
                  row["LL Limited"] = "";
                }
                if (!row.hasOwnProperty("HH Limited")) {
                  row["HH Limited"] = "";
                }
              });
            }

            table.clear().draw();
            table.rows.add(Tasklist[0]).draw();
  
            //  console.log(Tasklist)
  
            // 添加按钮点击事件处理程序
            $("#table tbody").on("click", ".btn", function () {
  
              var row = table.row($(this).closest("tr"));
  
              row.remove().draw();
            });

            // 处理PdM?单选按钮变化事件
            $("#table tbody").on("change", ".pdm-radio", function () {
              let $radio = $(this);
              let rowNode = $radio.closest("tr")[0];
              let row = table.row(rowNode);
              let rowData = row.data();
              let selectedValue = $radio.val();
              let previousValue = rowData["PdM?"] || "否/ No";
              
              // 如果从"否/ No"变为"是/ Yes"，在任务编号后添加" - PdM"后缀
              if (previousValue !== "是/ Yes" && selectedValue === "是/ Yes") {
                let taskNo = rowData["Task No"] || "";
                // 检查是否已经有" - PdM"后缀
                if (taskNo && !taskNo.endsWith(" - PdM")) {
                  rowData["Task No"] = taskNo + " - PdM";
                }
              }
              
              // 如果从"是/ Yes"变为"否/ No"，移除任务编号中的" - PdM"后缀
              if (previousValue === "是/ Yes" && selectedValue !== "是/ Yes") {
                let taskNo = rowData["Task No"] || "";
                // 检查是否有" - PdM"后缀
                if (taskNo && taskNo.endsWith(" - PdM")) {
                  rowData["Task No"] = taskNo.replace(" - PdM", "");
                }
              }
              
              // 更新行数据
              rowData["PdM?"] = selectedValue;
              row.data(rowData).draw(false);
              
              // 更新相关列的编辑状态
              updateEditableCells(rowNode, selectedValue === "是/ Yes");
            });

            // 处理Logic下拉框变化事件
            $("#table tbody").on("change", ".logic-select", function () {
              let $select = $(this);
              let rowNode = $select.closest("tr")[0];
              let row = table.row(rowNode);
              let rowData = row.data();
              let selectedValue = $select.val();
              
              // 更新行数据
              rowData["Logic"] = selectedValue;
              row.data(rowData).draw(false);
            });

            // 处理Strategy下拉框变化事件
            $("#table tbody").on("change", ".strategy-select", function () {
              let $select = $(this);
              let rowNode = $select.closest("tr")[0];
              let row = table.row(rowNode);
              let rowData = row.data();
              let selectedValue = $select.val();
              
              // 更新行数据
              rowData["Strategy"] = selectedValue;
              row.data(rowData).draw(false);
            });

            // 处理Line Status下拉框变化事件
            $("#table tbody").on("change", ".line-status-select", function () {
              let $select = $(this);
              let rowNode = $select.closest("tr")[0];
              let row = table.row(rowNode);
              let rowData = row.data();
              let selectedValue = $select.val();
              
              // 更新行数据
              rowData["Line Status"] = selectedValue;
              row.data(rowData).draw(false);
            });

            // 处理Resource下拉框变化事件
            $("#table tbody").on("change", ".resource-select", function () {
              let $select = $(this);
              let rowNode = $select.closest("tr")[0];
              let row = table.row(rowNode);
              let rowData = row.data();
              let selectedValue = $select.val();
              
              // 更新行数据
              rowData["Resource"] = selectedValue;
              row.data(rowData).draw(false);
            });

            // 更新可编辑单元格状态的函数
            function updateEditableCells(rowNode, isEditable) {
              let row = table.row(rowNode);
              let rowData = row.data();
              
              // 更新行数据中的PdM?值（如果还没有更新）
              if (rowData["PdM?"] !== (isEditable ? "是/ Yes" : "否/ No")) {
                rowData["PdM?"] = isEditable ? "是/ Yes" : "否/ No";
                row.data(rowData);
              }
              
              // 重新绘制行以更新所有列的渲染（包括Logic列的下拉框）
              row.draw(false);
            }

            $("#Submit").click(async () => {
              let reason, ADDitem, DELitem, EDITitem;
  
              // --- “班组确认” 检查是否有非“技术员”or“IDL”字段，自动判断是否提交班组审批 --- //
              let production_Approval = false;
  
  
              table.rows().every(function () {
                let data = this.data();
                if (!data.Resource.includes('技术员') && !data.Resource.includes('IDL')) {
                  production_Approval = true;
                }
              });
  
              console.log('production_Approval', production_Approval);
  
              // --- ----- --- //
  
              Swal.fire({
                input: 'textarea',
                inputLabel: '变更原因/ Reason for change',
                inputPlaceholder: '请输入变更原因/ Please type in the reason for change',
                showCancelButton: true,
                inputValidator: (value) => {
                  if (!value) {
                    return '变更原因不能为空/ Reason for change cannot be null';
                  }
                }
              }).then((firstValue) => {
                if (firstValue.isConfirmed) {
                  reason = '变更原因/ Reason for change: ' + firstValue.value;
                  return Swal.fire({
                    input: 'textarea',
                    inputLabel: '编辑条数/ Number of edits',
                    inputPlaceholder: '请输入编辑条数/ Please type in the number of edits',
                    // inputAttributes: { 'aria-label': '请输入变更原因/ Please type in the reason for change' },
                    showCancelButton: true,
                    inputValidator: (value) => { if (!value) { return '编辑条数不能为空/ Number of edits cannot be null'; } else if (!/^\d+$/.test(value)) { return '请输入有效的数字/ Please enter a valid number'; } }
                  }).then((secondValue) => {
                    if (secondValue.isConfirmed) {
                      EDITitem = '修改条目数/ Number of edit: ' + secondValue.value;
                      Swal.fire({
                        input: 'textarea',
                        inputLabel: '新增条数/ Number of Add',
                        inputPlaceholder: '请输入新增条数/ Please type in the number of add',
                        // inputAttributes: { 'aria-label': '请输入变更原因/ Please type in the reason for change' },
                        showCancelButton: true,
                        inputValidator: (value) => { if (!value) { return '新增条数不能为空/ Number of adds cannot be null'; } else if (!/^\d+$/.test(value)) { return '请输入有效的数字/ Please enter a valid number'; } }
                      }).then((thirdValue) => {
                        if (thirdValue.isConfirmed) {
                          ADDitem = '新增条目数/ Number of add: ' + thirdValue.value;
                          Swal.fire({
                            input: 'textarea',
                            inputLabel: '删除条数/ Number of Delete',
                            inputPlaceholder: '请输入删除条数/ Please type in the number of delete',
                            // inputAttributes: { 'aria-label': '请输入变更原因/ Please type in the reason for change' },
                            showCancelButton: true,
                            inputValidator: (value) => { if (!value) { return '删除条数不能为空/ Number of delete cannot be null'; } else if (!/^\d+$/.test(value)) { return '请输入有效的数字/ Please enter a valid number'; } }
                          }).then((forthValue) => {
                            if (forthValue.isConfirmed) {
                              DELitem = '删除条目数/ Number of delete: ' + forthValue.value;

                              Swal.fire({
                                  icon: 'question',
                                  title: '确认提交?/ Sure to submit?',
                                  text: '一旦提交不可修改/ Once submitted it cannot be modified',
                                  showCancelButton: true,
                                  confirmButtonText: '是的/ Yes',
                                  cancelButtonText: '取消/ Cancel'
                                }).then((result) => {

                                    if (result.isConfirmed) {
                                      Swal.fire({
                                        title: '请等待/ Please waite',
                                        text: '等待服务器返回结果/ Waiting for the serve',
                                        icon: 'info',
                                        allowOutsideClick: false,
                                        showConfirmButton: false
                                      })

                                      var obj = table.data().toArray();

                                      console.log('obj', obj)

                                      // let process = obj[0].Process;

                                      // console.log('process', process)

                                      var data = JSON.stringify(obj);

                                      var timestamp = new Date().getTime();

                                      date = new Date(timestamp)

                                      var year = date.getFullYear();

                                      var month = ('0' + (date.getMonth() + 1)).slice(-2);

                                      var day = ('0' + date.getDate()).slice(-2);

                                      var hours = ('0' + date.getHours()).slice(-2);

                                      var minutes = ('0' + date.getMinutes()).slice(-2);

                                      var seconds = ('0' + date.getSeconds()).slice(-2);

                                      var formattedDate = year + '-' + month + '-' + day + ' ' + hours + ':' + minutes + ':' + seconds;

                                      var loginInfo = $("#Code").text() + "_" + $("#Name").text() + " " + formattedDate;

                                      console.log("loginInfo", loginInfo, 'Code', $("#Code").text())

                                      let status = "待审批/ Pending";

                                      reason = reason + " " + ADDitem + " " + DELitem + " " + EDITitem;

                                      google.script.run.withSuccessHandler((r) => {
                                        if (r == true) {
                                          Swal.close();
                                          Swal.fire({
                                            title: '操作成功/ Success',
                                            icon: 'success'
                                          });
                                        } else {
                                          Swal.close();
                                          Swal.fire({
                                            title: '操作失败/ Fail',
                                            text: '请检查机型是否在Database for Web中已配置，或联系管理员。',
                                            icon: 'error'
                                          });
                                        }
                                      }).withFailureHandler((err) => {
                                        Swal.close();
                                        Swal.fire({
                                          title: '系统错误/ System Error',
                                          text: '服务器执行异常，请联系管理员。错误信息: ' + err.message,
                                          icon: 'error'
                                        });
                                      }).dataSave(
                                        data,
                                        loginInfo,
                                        reason,
                                        status,
                                        userEmail,
                                        process,
                                        production_Approval)
                                    }
                                  })

                            }
                          })
                        }
                      })
                    }
                  })
                }
              })
            })
          });
        } else {
          Swal.close();
          Swal.fire({
            title: "加载失败/ Loading Fail",
            icon: "error",
          });
        }
      })
        .getData();
    });
  
    $("#table").on("dblclick", "td", function () {
      var table = $("#table").DataTable();
      var cell = table.cell(this);
      var columnIndex = cell.index().column;
      var rowIndex = cell.index().row;
      var row = table.row(rowIndex);
      var rowData = row.data();
      
      // 确保rowData存在且是对象
      if (!rowData || typeof rowData !== 'object') {
        return;
      }
      
      // 检查是否是Unit、Component、Logic、TagName、LL Limited、HH Limited列（索引16-21）
      if ([16, 17, 18, 19, 20, 21].indexOf(columnIndex) !== -1) {
        // 检查PdM?是否为"是/ Yes"
        let pdmValue = rowData["PdM?"] || "否/ No";
        let isEditable = pdmValue === "是/ Yes";
        
        if (!isEditable) {
          Swal.fire({
            title: '无法编辑/ Cannot Edit',
            text: '请先将"预测性？/ PdM?"设置为"是"才能编辑此列/ Please set "PdM?" to "是" first to edit this column',
            icon: 'warning',
            confirmButtonText: '确定/ OK'
          });
          return;
        }
      }
      
      // 如果是Line Status列（索引8），不允许双击编辑（使用下拉框）
      if (columnIndex === 8) {
        return;
      }
      
      // 如果是Strategy列（索引9），不允许双击编辑（使用下拉框）
      if (columnIndex === 9) {
        return;
      }
      
      // 如果是Resource列（索引10），不允许双击编辑（使用下拉框）
      if (columnIndex === 10) {
        return;
      }
      
      // 如果是PdM?列（索引15），不允许双击编辑（使用单选按钮）
      if (columnIndex === 15) {
        return;
      }
      
      // 如果是Logic列（索引18），不允许双击编辑（使用下拉框）
      if (columnIndex === 18) {
        return;
      }
      
      // 如果是功能/ Option列（索引22），不允许双击编辑（操作按钮列）
      if (columnIndex === 22) {
        return;
      }
      
      // 获取单元格的原始数据值
      // 优先从rowData获取原始数据（不受render函数影响）
      var originalValue = "";
      var columnKeys = [
        "MachineType", "Task No", "Section", "Function", "Failure Mode", 
        "Task Type", "Task Description", "Frecuency", "Line Status", 
        "Strategy", "Resource", "No Resources", "Skill Level", 
        "Tools & Equip", "Estimated Time", "PdM?", "Unit", "Component", 
        "Logic", "TagName", "LL Limited", "HH Limited"
      ];
      
      // 首先从rowData获取原始数据值（这是最可靠的方式）
      if (columnIndex >= 0 && columnIndex < columnKeys.length && columnKeys[columnIndex]) {
        originalValue = rowData[columnKeys[columnIndex]] || "";
      }
      
      // 如果rowData中没有值，尝试从单元格的实际DOM内容中提取
      if (!originalValue || originalValue === "") {
        var $cell = $(this);
        
        // 检查单元格内是否有下拉框
        var $select = $cell.find('select');
        if ($select.length > 0) {
          originalValue = $select.val() || "";
        } else {
          // 检查单元格内是否有单选按钮
          var $radio = $cell.find('input[type="radio"]:checked');
          if ($radio.length > 0) {
            originalValue = $radio.val() || "";
          } else {
            // 对于普通文本单元格，从单元格的文本内容中提取
            var cellText = $cell.text().trim();
            if (cellText) {
              originalValue = cellText;
            } else {
              // 最后尝试从cell.data()获取（可能返回HTML字符串）
              try {
                var cellData = cell.data();
                if (typeof cellData === 'string') {
                  // 如果是HTML字符串，提取文本内容
                  var $temp = $('<div>').html(cellData);
                  originalValue = $temp.text().trim() || "";
                } else {
                  originalValue = cellData || "";
                }
              } catch (e) {
                originalValue = "";
              }
            }
          }
        }
      }
      
      // 确保originalValue是字符串类型
      if (originalValue === null || originalValue === undefined) {
        originalValue = "";
      } else {
        originalValue = String(originalValue);
      }
      
      // 如果值为"请输入"，编辑时显示为空
      if (originalValue === "请输入") {
        originalValue = "";
      }
      
      // 检查是否是LL Limited或HH Limited列（索引20, 21），使用数字输入框
      var isNumberColumn = (columnIndex === 20 || columnIndex === 21);
      var inputType = isNumberColumn ? 'number' : 'text';
      var step = isNumberColumn ? 'any' : null;
      
      // 转义originalValue中的特殊字符，防止XSS攻击
      var escapedValue = String(originalValue || "").replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      
      // 直接在HTML字符串中设置value属性，确保值正确显示
      var inputHtml = '<input class="form-control" type="' + inputType + '"' + 
        (step ? ' step="' + step + '"' : '') + 
        ' value="' + escapedValue + '">';
      
      cell.data(inputHtml).draw();
      
      // 等待DOM更新后，聚焦输入框并将光标定位到文本末尾，方便在原有内容基础上编辑
      setTimeout(function() {
        var $input = $(".form-control").last();
        $input.focus();
        // 将光标定位到文本末尾，而不是选中所有文本
        var length = $input.val().length;
        if (length > 0) {
          $input[0].setSelectionRange(length, length);
        }
      }, 10);
      // console.log(myInput);
      $(".form-control").on("blur", function () {
        var newValue = $(this).val();
        // console.log("失去焦点");
        
        // 如果是数字列，验证输入是否为有效数字
        if (isNumberColumn && newValue !== "") {
          // 检查是否为有效数字（包括小数和负数）
          var numValue = parseFloat(newValue);
          if (isNaN(numValue)) {
            Swal.fire({
              title: '输入错误/ Invalid Input',
              text: '请输入有效的数字/ Please enter a valid number',
              icon: 'error',
              confirmButtonText: '确定/ OK'
            });
            cell.data(originalValue).draw();
            return;
          }
          // 保存为数字字符串（保留用户输入的格式）
          newValue = newValue.trim();
        }
        
        if (newValue !== "") {
          cell.data(newValue).draw();
          // console.log("不为空");
        } else {
          cell.data(originalValue).draw();
          // console.log("为空");
        }
      });
      
      // 对于数字输入框，添加键盘事件限制（可选，但type="number"已经提供了基本限制）
      if (isNumberColumn) {
        $(".form-control").on("keypress", function (e) {
          // 允许数字、小数点、负号、退格、删除、Tab等
          var char = String.fromCharCode(e.which);
          if (!/[0-9.\-]/.test(char) && !(e.which === 8 || e.which === 46 || e.which === 9 || e.which === 27 || e.which === 13 || (e.which === 65 && e.ctrlKey === true) || (e.which >= 35 && e.which <= 40))) {
            e.preventDefault();
          }
        });
      }
    });
  
    $("#Add").click(() => {
      var table = $("#table").DataTable();
      
      // 获取当前选中的机型
      var currentMachineType = $("#MachineType").val() || "";
      
      // 获取下一个任务编号
      var nextTaskNo = "";
      if (currentMachineType) {
        // 获取表格中所有现有的任务编号
        var allRows = table.rows().data().toArray();
        var taskNumbers = [];
        
        allRows.forEach(function(row) {
          var taskNo = row["Task No"] || "";
          // 移除可能的" - PdM"后缀
          taskNo = taskNo.replace(" - PdM", "");
          
          // 检查任务编号是否匹配当前机型格式（例如：6AX-01）
          if (taskNo && taskNo.startsWith(currentMachineType + "-")) {
            // 提取数字部分
            var match = taskNo.match(new RegExp("^" + currentMachineType + "-(\\d+)$"));
            if (match && match[1]) {
              var num = parseInt(match[1], 10);
              if (!isNaN(num)) {
                taskNumbers.push(num);
              }
            }
          }
        });
        
        // 找到最大编号并+1
        if (taskNumbers.length > 0) {
          var maxNum = Math.max.apply(Math, taskNumbers);
          var nextNum = maxNum + 1;
          // 格式化为两位数（例如：01, 02, 03...）
          nextTaskNo = currentMachineType + "-" + nextNum.toString().padStart(2, "0");
        } else {
          // 如果没有现有编号，从01开始
          nextTaskNo = currentMachineType + "-01";
        }
      } else {
        // 如果没有选中机型，使用默认值
        nextTaskNo = "请输入";
      }
  
      var rowNode = table.row
        .add({
          MachineType: currentMachineType || "请输入",
          "Task No": nextTaskNo,
          Section: "请输入",
          Function: "请输入",
          "Failure Mode": "请输入",
          "Task Type": "请输入",
          "Task Description": "请输入",
          Frecuency: "请输入",
          "Line Status": "",
          Strategy: "",
          Resource: "",
          "No Resources": "请输入",
          "Skill Level": "请输入",
          "Tools & Equip": "请输入",
          "Estimated Time": "请输入",
          "PdM?": "否/ No",
          "Unit": "",
          "Component": "",
          "Logic": "",
          "TagName": "",
          "LL Limited": "",
          "HH Limited": "",
        })
        .draw()
        .node();
  
      $(rowNode).css("color", "red").animate({ color: "black" });
  
      $(rowNode).insertBefore(table.row(0).node());
    });
  </script>

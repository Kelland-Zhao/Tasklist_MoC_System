  <style>
    body { background: #f5f6f8; }
    .bg-nav { background: #E60012 !important; }

      font-size: 13px; font-weight: 700; color: #6c757d; letter-spacing: 1px;
      margin: 18px 0 10px; border-left: 3px solid #E60012; padding-left: 10px;
    }
    #table thead th,
    .dataTables_scrollHead thead th {
      background-color: #E60012 !important; color: white !important;
      position: sticky; top: 0; z-index: 10; text-align: center !important;
    }
    #table thead th small, #diffTable thead th small { font-size: 0.8em; font-weight: 400; opacity: 0.85; }

      text-align: left; max-width: 220px; word-wrap: break-word; overflow-wrap: break-word;

    #table tbody tr.even > td { background: #fff; }

    table.dataTable thead > tr > th.sorting_asc,
    table.dataTable thead > tr > th.sorting_desc { background-image: none !important; }

    .btn-reason-detail { font-size:11px; padding:1px 8px; margin-top:4px; }

    .flow { display:flex; align-items:flex-start; justify-content:center; }
    .flow-node { display:flex; flex-direction:column; align-items:center; flex:0 0 auto; width:42px; }
    .flow-dot { width:24px; height:24px; border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-size:13px; font-weight:700; line-height:1; }
    .flow-dot.done    { background:#198754; color:#fff; }
    .flow-dot.reject  { background:#dc3545; color:#fff; }
    .flow-dot.current { background:#ffc107; color:#333; box-shadow:0 0 0 3px rgba(255,193,7,0.25); }
    .flow-dot.wait    { background:#fff; border:2px solid #dee2e6; color:#adb5bd; }
    .flow-dot.na      { background:#e9ecef; color:#adb5bd; }
    .flow-label { font-size:10px; color:#888; margin-top:3px; line-height:1.1; }
    .flow-node.is-current .flow-label { color:#b8860b; font-weight:700; }
    .flow-conn { flex:1 1 auto; height:2px; background:#dee2e6; min-width:6px; margin-top:11px; }
    .flow-conn.done { background:#198754; }
    .flow-caption { font-size:11px; text-align:center; margin-top:6px; color:#555; }
    .flow-caption .who { color:#b8860b; font-weight:600; }
    .flow-caption.reject { color:#842029; font-weight:600; }
    .flow-caption.released { color:#155724; font-weight:600; }

      background:#E60012 !important; color:#fff !important; text-align:center !important; }

    .sb-toggle .form-check-input:checked { background-color:#E60012; border-color:#E60012; }

    #table tbody td:first-child { border-left:4px solid transparent; }
  </style>

<!-- ====== 真实页面 JS（与 Inspection_Progress_JS.html 同步） ====== -->
<script>
  const swalTitle = (cn, en) => `${cn}<span style="display:block;font-size:0.65em;color:#888;font-weight:400;line-height:1.3;margin-top:4px;">${en}</span>`;
  const swalHtml = (cn, en) => `<div>${cn}<div style="font-size:0.85em;color:#888;margin-top:6px;line-height:1.4;">${en}</div></div>`;

  $(document).ready(() => {
    Swal.fire({ title: swalTitle('加载中...', 'Loading...'), allowOutsideClick: false, showConfirmButton: false, didOpen: () => Swal.showLoading() });

    var emailConfig = [];

    function parseApprover(val) {
      if (!val || !val.trim()) return null;
      var action = '';
      if (val.includes('批准作废')) action = '批准作废';
      else if (val.includes('批准')) action = '批准';
      else if (val.includes('拒绝')) action = '拒绝';
      else action = val.substring(0, 4);
      var name = '', date = '';
      var emailMatch = val.match(/[\w.]+@[\w.]+/);
      if (emailMatch) name = emailMatch[0].split('@')[0];
      var dateMatch = val.match(/\d{4}-\d{2}-\d{2}/);
      if (dateMatch) date = dateMatch[0];
      return { action: action, name: name, date: date };
    }

    function getApproverEmail(machineType, key) {
      var item = null;
      for (var j = 0; j < emailConfig.length; j++) {
        if (emailConfig[j].MachineType === machineType) { item = emailConfig[j]; break; }
      }
      if (!item) return '';
      if (key === 'prod') return item['Mail_Production'] || '';
      if (key === 'lv1') return item['Mail_Approve1'] || '';
      if (key === 'lv2') return item['Mail_Approve2'] || '';
      if (key === 'dis') return item['Mail_Disseninate'] || '';
      return '';
    }

    function getPendingApprover(machineType, key) {
      var email = getApproverEmail(machineType, key);
      return email ? email.split('@')[0] : '';
    }

    function buildSteps(row) {
      return [
        { skip: row['Production Approval (Y/N)'] === 'N', parsed: parseApprover(row['Production Approver']), label: '班组', key: 'prod' },
        { skip: false, parsed: parseApprover(row['Approver1']), label: '审1', key: 'lv1' },
        { skip: false, parsed: parseApprover(row['Approver2']), label: '审2', key: 'lv2' },
        { skip: false, parsed: parseApprover(row['Dissminater']), label: '发布', key: 'dis' }
      ];
    }

    function findCurrentIdx(steps) {
      for (var i = 0; i < steps.length; i++) {
        if (!steps[i].skip && !steps[i].parsed) return i;
      }
      return -1;
    }

    function pendingApproverEmail(row) {
      var steps = buildSteps(row);
      var idx = findCurrentIdx(steps);
      if (idx === -1) return '';
      return getApproverEmail(row['MachineType'], steps[idx].key);
    }

    function statusBorderColor(status) {
      if (status === '待审批/ Pending') return '#ffc107';
      if (status === '作废待审批/ Void Pending' || status === '拒绝/ Rejected') return '#dc3545';
      return '#adb5bd';
    }

    function extractMainReason(reason) {
      if (!reason) return '';
      if (!reason.includes('变更原因/ Reason for change:')) return reason;
      var afterReason = reason.split('变更原因/ Reason for change:')[1].trim();
      var addIndex = afterReason.indexOf('新增条目数');
      if (addIndex > 0) return afterReason.substring(0, addIndex).trim();
      var firstSpaceIndex = afterReason.indexOf(' ');
      return firstSpaceIndex > 0 ? afterReason.substring(0, firstSpaceIndex) : afterReason;
    }

    function parseOperator(val) {
      if (!val) return { job: '', name: '' };
      var job = '', name = '';
      var jm = val.match(/JobNumber:\s*([^_]+)/);
      if (jm) job = jm[1].trim();
      var nm = val.match(/Name:\s*(.+)$/);
      if (nm) name = nm[1].replace(/\s*\d{4}[-\/]\d{1,2}[-\/]\d{1,2}.*$/, '').trim();
      return { job: job, name: name };
    }

    var userMail = '';
    var onlyMineFlag = false;

    var table = $('#table').DataTable({
      columns: [
        { data: 'MachineType' },
        { data: 'Operator' },
        { data: 'Reason' },
        { data: 'Production Approval (Y/N)' },
        { data: null, defaultContent: '' },
        { data: 'Status' },
        { data: 'submitMail' },
        { data: null, defaultContent: '' }
      ],
      autoWidth: false,
      scrollX: true,
      pageLength: 25,
      language: {
        emptyTable: '<div style="padding:24px 0;color:#6c757d;font-size:13px;">暂无正在审批的点检任务<br><span style="font-size:11px;">No tasks under approval</span></div>'
      },
      rowCallback: function (rowEl, data) {
        $(rowEl).children('td:first-child').css('border-left', '4px solid ' + statusBorderColor(data['Status']));
      },
      columnDefs: [
        { targets: 0, width: '100px' },
        { targets: 2, width: '120px' },
        { targets: 4, width: 'auto', createdCell: function (td) { $(td).css('background-color', '#f4f9ff'); } },
        { targets: 5, width: '100px' },
        { targets: 7, width: '120px' },
        {
          targets: 1, render: function (data, type) {
            if (type !== 'display') return data;
            var o = parseOperator(data);
            return '<div style="font-size:0.8em;line-height:1.35;">' +
              '<div style="color:#6c757d;">' + (o.job || '') + '</div>' +
              '<div style="font-weight:600;color:#333;">' + (o.name || '') + '</div></div>';
          }
        },
        {
          targets: 6, render: function (data, type) {
            if (type === 'display') return '<span style="font-size:0.75em;">' + (data || '') + '</span>';
            return data;
          }
        },
        {
          targets: 3, render: function (data, type) {
            if (type !== 'display') return data;
            if (data === 'Y') return '<span class="yn-badge yn-y">是<small>Yes</small></span>';
            if (data === 'N') return '<span class="yn-badge yn-n">否<small>No</small></span>';
            return '<span class="yn-badge yn-n">' + (data || '-') + '</span>';
          }
        },
        {
          targets: 4, render: function (data, type, row) {
            if (type !== 'display') return '';
            var steps = buildSteps(row);
            var hasReject = false;
            for (var i = 0; i < steps.length; i++) {
              if (steps[i].parsed && steps[i].parsed.action.includes('拒绝')) hasReject = true;
            }
            var currentIdx = findCurrentIdx(steps);
            var html = '<div class="flow">';
            for (var i = 0; i < steps.length; i++) {
              var s = steps[i], cls = '', inner = '', tip = s.label;
              if (s.skip) { cls = 'na'; inner = '<i class="bi bi-dash"></i>'; tip += '：N/A'; }
              else if (s.parsed && s.parsed.action.includes('拒绝')) { cls = 'reject'; inner = '<i class="bi bi-x"></i>'; tip += '：拒绝 ' + s.parsed.name + ' ' + s.parsed.date; }
              else if (s.parsed) { cls = 'done'; inner = '<i class="bi bi-check"></i>'; tip += '：' + s.parsed.action + ' ' + s.parsed.name + ' ' + s.parsed.date; }
              else if (i === currentIdx) { cls = 'current'; inner = (i + 1); tip += '：待审批'; }
              else { cls = 'wait'; inner = ''; tip += '：待'; }
              var nodeCls = (i === currentIdx) ? 'flow-node is-current' : 'flow-node';
              html += '<div class="' + nodeCls + '" title="' + tip + '">' +
                '<div class="flow-dot ' + cls + '">' + inner + '</div>' +
                '<div class="flow-label">' + s.label + '</div></div>';
              if (i < steps.length - 1) {
                var connDone = s.parsed && !s.parsed.action.includes('拒绝');
                html += '<div class="flow-conn' + (connDone ? ' done' : '') + '"></div>';
              }
            }
            html += '</div>';
            if (hasReject) {
              html += '<div class="flow-caption reject">已拒绝 / Rejected</div>';
            } else if (currentIdx === -1) {
              html += '<div class="flow-caption released">已发布 / Released</div>';
            } else {
              var who = getPendingApprover(row['MachineType'], steps[currentIdx].key);
              html += '<div class="flow-caption">当前：' + steps[currentIdx].label +
                (who ? ' · 待 <span class="who">' + who + '</span>' : '') + '</div>';
            }
            return html;
          }
        },
        {
          targets: 5, render: function (data, type) {
            if (type !== 'display') return data;
            var map = {
              '待审批/ Pending': 'st-pending',
              '作废待审批/ Void Pending': 'st-pending',
              '拒绝/ Rejected': 'st-void',
              '生效/ Effective': 'st-effective',
              '取代/ Replace': 'st-replace',
              '作废/ Void': 'st-void'
            };
            var cls = map[data] || 'st-replace';
            var parts = (data || '').split('/ ');
            var cn = parts[0] || data || '';
            var en = parts.slice(1).join('/ ') || '';
            return '<span class="st-badge ' + cls + '"><span>' + cn + '</span>' +
              (en ? '<small>' + en + '</small>' : '') + '</span>';
          }
        },
        {
          targets: 2, render: function (data, type) {
            if (type !== 'display') return data;
            var mainReason = extractMainReason(data);
            return '<span class="reason-main">' + (mainReason || '-') + '</span>' +
              '<button type="button" class="btn btn-outline-secondary btn-sm btn-reason-detail d-block mx-auto">详情 / Details</button>';
          }
        },
        {
          targets: 7, render: function () {
            return '<button type="button" class="btn btn-info btn-sm btn-tasklist-detail">点检清单 / Detail</button>';
          }
        }
      ]
    });

    google.script.run.withSuccessHandler((r) => {
      Swal.close();
      if (r.length !== 4) {
        Swal.fire({ icon: 'error', title: swalTitle('加载失败', 'Loading Fail'), confirmButtonText: '确定 / OK' });
        return;
      }

      var objArrayApprovallist = r[0];
      emailConfig = r[1];
      userMail = (r[2] || '').toString().trim().toLowerCase();

      $.fn.dataTable.ext.search.push(function (settings, dataArr, dataIndex) {
        if (settings.nTable.id !== 'table') return true;
        if (!onlyMineFlag) return true;
        var row = table.row(dataIndex).data();
        return !!userMail && pendingApproverEmail(row).toLowerCase() === userMail;
      });
      $('#onlyMine').on('change', function () { onlyMineFlag = this.checked; table.draw(); });

      var progressItems = objArrayApprovallist.filter((row) => {
        if (!row.Status || row.Status.includes('状态') || row.Status.includes('Status')) return false;
        return row.Status !== '生效/ Effective'
          && row.Status !== '取代/ Replace'
          && row.Status !== '作废/ Void'
          && row.Status !== '拒绝/ Rejected';
      });

      table.clear();
      if (progressItems.length) table.rows.add(progressItems);
      table.draw();

      var mineCount = userMail
        ? progressItems.filter((row) => pendingApproverEmail(row).toLowerCase() === userMail).length
        : 0;
      $('#sbMine').text(mineCount);
      $('#sbTotal').text(progressItems.length);
      $('#summaryBar').css('display', 'flex');

      Swal.fire({ icon: 'success', title: swalTitle('加载成功', 'Loading Success'), timer: 1500, showConfirmButton: false });

      $('#table tbody').off('click', '.btn-tasklist-detail').on('click', '.btn-tasklist-detail', function () {
        var rowData = table.row($(this).closest('tr')).data();
        var item = objArrayApprovallist.filter((row) => row.Operator === rowData['Operator']);
        if (!item.length) return;
        var tasklist = JSON.parse(item[0].Tasklist);

        var tableHTML = '<table id="diffTable" class="display" style="width:100%">' +
          '<thead><tr>' +
          '<th>单元<br><small>Unit</small></th><th>部位及内容<br><small>Parts</small></th><th>检查标准<br><small>Inspection Std</small></th>' +
          '<th>使用工具<br><small>Tool</small></th><th>方法<br><small>Method</small></th><th>设备状态<br><small>Status</small></th>' +
          '<th>检查频率<br><small>Frequency</small></th><th>适用机型<br><small>Machine Type</small></th><th>执行人<br><small>Resource</small></th>' +
          '<th>工序<br><small>Process</small></th>' +
          '</tr></thead></table>';

        Swal.fire({ title: swalTitle('点检清单', 'Inspection Tasklist'), html: tableHTML, width: '90%', showConfirmButton: false, showCloseButton: true });

        $('#diffTable').DataTable({
          destroy: true,
          columns: [
            { data: 'Unit' }, { data: 'Parts' }, { data: 'Inspection Std' }, { data: 'Tool' },
            { data: 'Method' }, { data: 'Status' }, { data: 'Frequency' }, { data: 'Machine Type' },
            { data: 'Resource' }, { data: 'Process' }
          ],
          pageLength: 100
        }).clear().rows.add(tasklist).draw();
      });

      $('#table tbody').off('click', '.btn-reason-detail').on('click', '.btn-reason-detail', function () {
        var rowData = table.row($(this).closest('tr')).data();
        var reason = rowData['Reason'];
        var parts = {};
        if (reason && reason.includes('变更原因/ Reason for change:')) {
          var afterReason = reason.split('变更原因/ Reason for change:')[1].trim();
          var addIndex = afterReason.indexOf('新增条目数');
          parts['mainReason'] = addIndex > 0 ? afterReason.substring(0, addIndex).trim() : afterReason;
          var addMatch = afterReason.match(/新增条目数\/ Number of add: (\d+)/);
          var deleteMatch = afterReason.match(/删除条目数\/ Number of delete: (\d+)/);
          var editMatch = afterReason.match(/修改条目数\/ Number of edit: (\d+)/);
          if (addMatch) parts['addCount'] = addMatch[1];
          if (deleteMatch) parts['deleteCount'] = deleteMatch[1];
          if (editMatch) parts['editCount'] = editMatch[1];
        } else {
          parts['mainReason'] = reason || '';
        }

        var html = '<table class="table table-bordered table-striped reason-detail-table">' +
          '<thead><tr><th>项目 / Item</th><th>内容 / Content</th></tr></thead><tbody>' +
          '<tr><td>主要变更原因 / Main Reason</td><td>' + (parts['mainReason'] || '') + '</td></tr>';
        if (parts['addCount']) html += '<tr><td>新增条目数 / Number of Add</td><td>' + parts['addCount'] + '</td></tr>';
        if (parts['deleteCount']) html += '<tr><td>删除条目数 / Number of Delete</td><td>' + parts['deleteCount'] + '</td></tr>';
        if (parts['editCount']) html += '<tr><td>修改条目数 / Number of Edit</td><td>' + parts['editCount'] + '</td></tr>';
        html += '</tbody></table>';

        Swal.fire({ title: swalTitle('变更原因详情', 'Change Reason Details'), html: html, width: '80%', confirmButtonText: '确定 / OK' });
      });

    }).getApprovaldata_IN();
  });
</script>

</html>

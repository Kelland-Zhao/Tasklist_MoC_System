<script>
  $(document).ready(() => {
    let title = $('#title').text();
    let styledText1 = '<span style="color: red; font-weight: bold;">点检</span>';
    let styledText2 = '<span style="color: red; font-weight: bold;font-style:italic;">Inspection</span>';
    let newText = title.replace('点检', styledText1).replace('Inspection', styledText2);
    $('#title').html(newText)

    swal.fire({
      title: '页面加载中/ Page Loading',
      text: '页面加载中，请稍后.../ Page loading, please wait...',
      icon: 'info',
      allowOutsideClick: false,
      showConfirmButton: false
    });
    var table = $('#table').DataTable({

      columns: [
        { data: 'MachineType' },
        { data: 'Operator' },
        { data: 'Reason' },
        { data: 'Approver1' },
        { data: 'Comment1' },
        { data: 'Approver2' },
        { data: 'Comment2' },
        { data: 'Dissminater' },
        { data: 'Status' },
        {
          data: 'submitMail',
          "visible": false
        }
      ],
      columnDefs: [
        {
          targets: 10, // 最后3列的索引
          render: function (data, type, row, meta) {
            return '<button class="btn btn-info btn-sm">任务清单/ Detail Tasklist</button>';
          }
        }
      ],
      pageLength: 50
    });


    google.script.run.withSuccessHandler((r) => {
      if (r.length == 2) {
        swal.close();
        swal.fire({
          title: '加载成功/ Loading Success',
          icon: 'success'
        });

        let objArrayApprovallist = r[0];

        let mail = r[1];

        console.log(r);

        let effectiveItem = objArrayApprovallist.filter((r) => { return r.Status === "生效/ Effective" });

        effectiveItem.forEach((r) => {

          r['Reason'] = formatText(r['Reason']);

        })

        table.clear().draw();

        table.rows.add(effectiveItem).draw();

        $("#Name").text(mail);

        let tableHTML = '<table id="diffTable" class="display" style="width:100%">';
        tableHTML += "<thead>"
        tableHTML += "<tr>"
        tableHTML += "<th>单元/ Unit</th>"
        tableHTML += "<th>部位及内容/ Parts</th>"
        tableHTML += "<th>检查标准/ Inspection Std</th>"
        tableHTML += "<th>使用工具/ Tool</th>"
        tableHTML += "<th>方法/ Method</th>"
        tableHTML += "<th>设备状态/ Status</th>"
        tableHTML += "<th>检查频率/ Frequency</th>"
        tableHTML += "<th>适用机型/ Machine Type</th>"
        tableHTML += "<th>执行人/ Resource</th>"
        tableHTML += "<th>工序/ Process</th>"
        tableHTML += "</tr>"
        tableHTML += "</thead>"
        tableHTML += "</table>"


        let diffTableData = [];

        $("#table tbody").on('click', '.btn-info', function () {
          swal.fire({
            title: '任务清单/ Tasklist',
            html: tableHTML,
            height: '90%',
            width: '90%'
          });
          // 获取当前行的数据
          let rowData = table.row($(this).closest('tr')).data();

          // 提取申请人/ Editor 信息
          let editor = rowData['Operator'];
          let item = r[0].filter((r) => { return r.Operator == editor });
          let tasklist = JSON.parse(item[0].Tasklist);
          // console.log(tasklist);

          let diffTable = $('#diffTable').DataTable({

            columns: [
              { data: 'Unit' },
              { data: 'Parts' },
              { data: 'Inspection Std' },
              { data: 'Tool' },
              { data: 'Method' },
              { data: 'Status' },
              { data: 'Frequency' },
              { data: 'Machine Type' },
              { data: 'Resource' },
              { data: 'Process' }

            ],
            pageLength: 100
          });
          diffTable.clear().rows.add(tasklist).draw(); // 填充并绘制 diffTable

        })

      } else {
        swal.close();
        swal.fire({
          title: '加载失败/ Loading Fail',
          icon: 'error'
        });
      };

    }).getEffectiveData_IN()
  })



  function formatText(text) {
    // 定义固定字段
    const keywords = [
      "新增条目",
      "删除条目",
      "修改条目"
    ];

    // 遍历每个固定字段，在其前面添加换行符
    keywords.forEach(keyword => {
      text = text.replace(keyword, "\n" + keyword);
    });

    // 去掉文本最开始的换行符（如果存在的话）
    text = text.trimStart();

    // 将文本中的 \n 转换为 <br> 以用于 HTML 显示
    return text.replace(/\n/g, "<br>");
  }























































</script>

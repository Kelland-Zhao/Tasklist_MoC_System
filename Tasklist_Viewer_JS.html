<script>
  $(document).ready(() => {
    let title = $('#title').text();
    let styledText1 = '<span style="color: red; font-weight: bold;">保养</span>';
    let styledText2 = '<span style="color: red; font-weight: bold;font-style:italic;">PM</span>';
    let newText = title.replace('保养', styledText1).replace('PM', styledText2);
    $('#title').html(newText)

    Swal.fire({
      title: '页面加载中/ Page Loading',
      text: '页面加载中，请稍后.../ Page loading, please wait...',
      icon: 'info',
      allowOutsideClick: false,
      showConfirmButton: false
    });
    var table = $('#table').DataTable({

      columns: [
        { data: 'MachineType' },
        { data: 'Operator' },
        { data: 'Reason' },
        { data: 'Approver1' },
        { data: 'Comment1' },
        { data: 'Approver2' },
        { data: 'Comment2' },
        { data: 'Dissminater' },
        { data: 'Status' },
        {
          data: 'submitMail',
          "visible": false
        }
      ],
      columnDefs: [
        {
          targets: 10, // 最后3列的索引
          render: function (data, type, row, meta) {
            return '<button class="btn btn-info btn-sm">任务清单/ Detail Tasklist</button>';
          }
        }
      ],
      pageLength: 50
    });


    google.script.run.withSuccessHandler((r) => {
      if (r.length == 2) {
        Swal.close();
        Swal.fire({
          title: '加载成功/ Loading Success',
          icon: 'success'
        });

        let objArrayApprovallist = r[0];

        let mail = r[1];

        // console.log("all tasklist",r);

        let effectiveItem = objArrayApprovallist.filter((r) => { return r.Status === "生效/ Effective" });

        let tasklist_6AX = objArrayApprovallist.filter((r) => { return r.MachineType === "6AX" });

        console.log('tasklist_6AX', tasklist_6AX);

        effectiveItem.forEach((r) => {

          r['Reason'] = formatText(r['Reason']);

        })

        // console.log('effectiveItem-2', effectiveItem);


        table.clear().draw();

        table.rows.add(effectiveItem).draw();

        $("#Name").text(mail);

        let tableHTML = '<table id="diffTable" class="display" style="width:100%">';
        tableHTML += "<thead>"
        tableHTML += "<tr>"
        tableHTML += "<th>机型/ Machine Type</th>"
        tableHTML += "<th>任务编号/ Task No.</th>"
        tableHTML += "<th>单元/ Section</th>"
        tableHTML += "<th>功能/ Function</th>"
        tableHTML += "<th>失效模式/ Failure Mode</th>"
        tableHTML += "<th>任务类型/ Task Type</th>"
        tableHTML += "<th>任务描述/ Task Description</th>"
        tableHTML += "<th>频率/ Frecuency</th>"
        tableHTML += "<th>设备状态/ Line Status</th>"
        tableHTML += "<th>保养策略/ Strategy</th>"
        tableHTML += "<th>执行人/ Resource</th>"
        tableHTML += "<th>人数/ No. Resources</th>"
        tableHTML += "<th>技能等级/ Skill Level</th>"
        tableHTML += "<th>技能/ Tools & Equip</th>"
        tableHTML += "<th>预估时间/ Estimated Time</th>"
        tableHTML += "</tr>"
        tableHTML += "</thead>"
        tableHTML += "</table>"


        let diffTableData = [];

        $("#table tbody").on('click', '.btn-info', function () {
          Swal.fire({
            title: '任务清单/ Tasklist',
            html: tableHTML,
            height: '90%',
            width: '90%'
          });
          // 获取当前行的数据
          let rowData = table.row($(this).closest('tr')).data();

          // 提取申请人/ Editor 信息
          let editor = rowData['Operator'];
          let item = r[0].filter((r) => { return r.Operator == editor });
          let tasklist = JSON.parse(item[0].Tasklist);
          // console.log(tasklist);

          let diffTable = $('#diffTable').DataTable({

            columns: [
              { data: 'MachineType' },
              { data: 'Task No' },
              { data: 'Section' },
              { data: 'Function' },
              { data: 'Failure Mode' },
              { data: 'Task Type' },
              { data: 'Task Description' },
              { data: 'Frecuency' },
              { data: 'Line Status' },
              { data: 'Strategy' },
              { data: 'Resource' },
              { data: 'No Resources' },
              { data: 'Skill Level' },
              { data: 'Tools & Equip' },
              { data: 'Estimated Time' }
            ],
            pageLength: 100
          });
          diffTable.clear().rows.add(tasklist).draw(); // 填充并绘制 diffTable

        })

      } else {
        Swal.close();
        Swal.fire({
          title: '加载失败/ Loading Fail',
          icon: 'error'
        });
      };

    }).getEffectiveData()
  })


  function formatText(text) {
    // 定义固定字段
    const keywords = [
      "新增条目",
      "删除条目",
      "修改条目"
    ];

    // 遍历每个固定字段，在其前面添加换行符
    keywords.forEach(keyword => {
      text = text.replace(keyword, "\n" + keyword);
    });

    // 去掉文本最开始的换行符（如果存在的话）
    text = text.trimStart();

    // 将文本中的 \n 转换为 <br> 以用于 HTML 显示
    return text.replace(/\n/g, "<br>");
  }
























































</script>

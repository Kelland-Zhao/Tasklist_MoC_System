<script>
  $(document).ready(() => {
    let title = $('#title').text();
    let styledText1 = '<span style="color: red; font-weight: bold;">保养</span>';
    let styledText2 = '<span style="color: red; font-weight: bold;font-style:italic;">PM</span>';
    let newText = title.replace('保养', styledText1).replace('PM', styledText2);
    $('#title').html(newText)

    Swal.fire({
      title: "页面加载中/ Page Loading",
      text: "页面加载中，请稍后.../ Page loading, please wait...",
      icon: "info",
      allowOutsideClick: false,
      showConfirmButton: false,
    });

    google.script.run
      .withSuccessHandler((r) => {
        if (r.length === 4) {
          Swal.close();
          Swal.fire({
            title: "加载成功/ Loading Success",
            icon: "success",
          });
          // console.log(r)
          let nameText = $("#Name").text();
          let nameParts = nameText.split(":");
          let name = nameParts[1].trim();
          let jobNumberText = $("#Code").text();
          let jobNumberParts = jobNumberText.split(":");
          let jobNumber = jobNumberParts[1].trim();
          console.log(jobNumber);
          let authorizationData = r[3];
          console.log(authorizationData);
          let correctData = authorizationData.filter((r) => {
            return r.ID == jobNumber;
          });
          // console.log(correctData);

          let production_Approval = correctData[0]['Production Approval'];

          let approval1 = correctData[0]["Approval 1"];

          let approval2 = correctData[0]["Approval 2"];

          let dissminater = correctData[0].Dissminater;

          let ccMail = correctData[0].ccMail;

          let process = correctData[0].Process;

          // console.log(approval1,approval2,dissminater,ccMail)

          $("#production_Approval").val(production_Approval);

          $("#approval1").val(approval1);

          $("#approval2").val(approval2);

          $("#Dissminater").val(dissminater);

          $("#ccMail").val(ccMail);

          $("#process").val(process);

          let machineType_inlist = [];

          r[1].forEach((r) => {

            machineType_inlist.push(r.MachineType);

          });

          let machineTypeError = false;

          $("#machineType").on("change", function () {

            machineType_inlist.forEach((r) => {

              if (r == $("#machineType").val()) {

                machineTypeError = true;

                Swal.fire({
                  title: "错误/ Error",
                  text: "该名称与现有机台重复/ The content is incomplete",
                  icon: "error",
                });

                $("#machineType").val("");

                return;
              } //if
            }); // forEach
          }); //change;
          $("#ConfirmInfo").click(() => {
            let production_Approval = $("#production_Approval").val() + '@colpal.com';

            let mailApprove1 = $("#approval1").val() + "@colpal.com";

            let mailApprove2 = $("#approval2").val() + "@colpal.com";

            let mailDissminater = $("#Dissminater").val() + "@colpal.com";

            let mailCC = $("#ccMail")
              .val()
              .split(",")
              .map((email) => email.trim() + "@colpal.com")
              .join(",");

            let machineType = $("#machineType").val();

            let process = $("#process").val();

            // let judge_Production_Approval = $('input[name="approval"]:checked').val();


            if (
              $("#machineType").val().trim() === "" ||
              $("#process").val().trim() === "" ||
              $("#approval1").val().trim() === "" ||
              $("#approval2").val().trim() === "" ||
              $("#Dissminater").val().trim() === "" ||
              $("#ccMail").val().trim() === ""
              || $("#production_Approval").val().trim() === ''
            ) {
              Swal.fire({
                title: "错误/ Error",
                text: "内容填写不完整/ The content is incomplete",
                icon: "error",
              });
            } else {
              Swal.fire({
                title: "确认？/ Confirm?",
                text: "是否确认上述信息？/ Do you confirm the above information?",
                icon: "question",
                showCancelButton: true,
                confirmButtonText: "是的/ Yes",
                cancelButtonText: "取消/ Cancel",
              }).then((result) => {
                if (result.isConfirmed) {
                  //将填写的内容block住
                  $(
                    "#production_Approval,#approval1,#approval2,#Dissminater,#ccMail,#machineType,#process,#ConfirmInfo,input[name='approval']"
                  ).prop("disabled", true);
                  let objDatabase = {};

                  objDatabase.MachineType = machineType;

                  objDatabase.Process = process;

                  objDatabase.Mail_production_Approval = production_Approval;

                  objDatabase.Mail_Approve1 = mailApprove1;

                  objDatabase.Mail_Approve2 = mailApprove2;

                  objDatabase.Mail_Disseninate = mailDissminater;

                  objDatabase.Mail_CC = mailCC;

                  // objDatabase.judge_Production_Approval = judge_Production_Approval;// 判断是否需要班组审批字段

                  // 生成默认的100条数据
                  let defaultData = [];
                  for (let i = 1; i <= 100; i++) {
                    defaultData.push({
                      MachineType: machineType,
                      "Task No":
                        machineType + "-" + i.toString().padStart(2, "0"), // 使用padStart添加前导零
                      Section: "",
                      Function: "",
                      "Failure Mode": "",
                      "Task Type": "",
                      "Task Description": "",
                      Frecuency: "",
                      "No Resources": "",
                      "Skill Level": "",
                      "Tools & Equip": "",
                      "Estimated Time": "",
                      "Line Status": "",
                      Strategy: "",
                      Resource: "",
                      "PdM?": "否/ No",
                      "Unit": "",
                      "Component": "",
                      "Logic": "",
                      "TagName": "",
                      "LL Limited": "",
                      "HH Limited": "",
                    });
                  }
                  // 根据输入内容来显示或隐藏表格
                  $("#table,#submitTasklist").css("display", "table");
                  //DataTables初始化
                  let table = $("#table").DataTable({
                    columns: [
                      { data: "MachineType" },
                      { data: "Task No" },
                      { data: "Section" },
                      { data: "Function" },
                      { data: "Failure Mode" },
                      { data: "Task Type" },
                      { data: "Task Description" },
                      { data: "Frecuency" },
                      { data: "Line Status" },
                      {
                        data: "Strategy",
                        render: function (data, type, row) {
                          // 在执行人列中渲染一个带有两个选项的下拉列表
                          return `
                                                                                      <div class="input-group">
                                                                                        <select class="form-control" id="Strategy">
                                                                                          <option value="预防性/ Preventive">预防性/ Preventive</option>
                                                                                          <option value="预测性/ Predictive">预测性/ Predictive</option>
                                                                                        </select>
                                                                                      </div>
                                                                                      `;
                        },
                      },
                      { data: "Resource" },
                      { data: "No Resources" },
                      { data: "Skill Level" },
                      { data: "Tools & Equip" },
                      { data: "Estimated Time" },
                      { data: "PdM?" },
                      { data: "Unit" },
                      { data: "Component" },
                      { data: "Logic" },
                      { data: "TagName" },
                      { data: "LL Limited" },
                      { data: "HH Limited" },
                    ],
                    columnDefs: [
                      {
                        targets: 8, // 设备状态/ Line Status列
                        render: function (data, type, row, meta) {
                          let options = [
                            "停机",
                            "开机",
                            "停/ 开机"
                          ];
                          let selectHtml = '<select class="form-select form-select-sm line-status-select" style="width: 100%;">';
                          selectHtml += '<option value="">请选择/ Please select</option>';
                          options.forEach(function(option) {
                            let selected = (data === option) ? 'selected' : '';
                            selectHtml += '<option value="' + option + '" ' + selected + '>' + option + '</option>';
                          });
                          selectHtml += '</select>';
                          return selectHtml;
                        },
                      },
                      {
                        targets: 10, // 执行人/ Resource列
                        render: function (data, type, row, meta) {
                          let options = [
                            "技术员",
                            "操作员"
                          ];
                          let selectHtml = '<select class="form-select form-select-sm resource-select" style="width: 100%;">';
                          selectHtml += '<option value="">请选择/ Please select</option>';
                          options.forEach(function(option) {
                            let selected = (data === option) ? 'selected' : '';
                            selectHtml += '<option value="' + option + '" ' + selected + '>' + option + '</option>';
                          });
                          selectHtml += '</select>';
                          return selectHtml;
                        },
                      },
                      {
                        targets: 15, // 预测性？/ PdM?列
                        render: function (data, type, row, meta) {
                          // 使用时间戳和随机数生成唯一ID，避免行索引变化问题
                          let uniqueId = meta.row + "_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
                          let isYes = data === "是/ Yes" || data === "是" || data === true || data === "Yes";
                          let radioName = "pdm_" + uniqueId;
                          return '<div class="form-check form-check-inline">' +
                            '<input class="form-check-input pdm-radio" type="radio" name="' + radioName + '" id="' + radioName + '_yes" value="是/ Yes" ' + (isYes ? 'checked' : '') + '>' +
                            '<label class="form-check-label" for="' + radioName + '_yes">是/ Yes</label>' +
                            '</div>' +
                            '<div class="form-check form-check-inline">' +
                            '<input class="form-check-input pdm-radio" type="radio" name="' + radioName + '" id="' + radioName + '_no" value="否/ No" ' + (!isYes ? 'checked' : '') + '>' +
                            '<label class="form-check-label" for="' + radioName + '_no">否/ No</label>' +
                            '</div>';
                        },
                      },
                      {
                        targets: 18, // Logic列
                        render: function (data, type, row, meta) {
                          let pdmValue = row["PdM?"];
                          let isEditable = pdmValue === "是/ Yes";
                          
                          if (isEditable) {
                            // 可编辑时显示下拉框
                            let options = [
                              "HighAlarm_Max",
                              "HiighAlarm_Min",
                              "HighAlarm_Average",
                              "HighAlarm_Slope",
                              "LowAlarm_Max",
                              "LowAlarm_Min",
                              "LowAlarm_Average",
                              "LowAlarm_Slope",
                              "Out_of_range"
                            ];
                            let selectHtml = '<select class="form-select form-select-sm logic-select" style="width: 100%;">';
                            selectHtml += '<option value="">请选择/ Please select</option>';
                            options.forEach(function(option) {
                              let selected = (data === option) ? 'selected' : '';
                              selectHtml += '<option value="' + option + '" ' + selected + '>' + option + '</option>';
                            });
                            selectHtml += '</select>';
                            return selectHtml;
                          } else {
                            // 不可编辑时显示文本
                            return '<span class="non-editable-cell" style="background-color: #e9ecef; cursor: not-allowed;">' + (data || "") + '</span>';
                          }
                        },
                      },
                      {
                        targets: [16, 17, 19, 20, 21], // Unit, Component, TagName, LL Limited, HH Limited
                        render: function (data, type, row, meta) {
                          let pdmValue = row["PdM?"];
                          let isEditable = pdmValue === "是/ Yes";
                          let cellClass = isEditable ? "editable-cell" : "non-editable-cell";
                          let cellStyle = isEditable ? "" : "background-color: #e9ecef; cursor: not-allowed;";
                          return '<span class="' + cellClass + '" style="' + cellStyle + '">' + (data || "") + '</span>';
                        },
                      },
                      {
                        targets: [15, 16, 17, 18, 19, 20, 21], // 预测性？/ PdM? 到 HH Limited列
                        createdCell: function (td, cellData, rowData, row, col) {
                          // 对于索引16-21的列，如果不可编辑则保持灰色，否则使用黄色高亮
                          if (col >= 16 && col <= 21) {
                            let pdmValue = rowData["PdM?"];
                            let isEditable = pdmValue === "是/ Yes";
                            if (!isEditable) {
                              // 不可编辑时保持灰色背景
                              $(td).css('background-color', '#e9ecef');
                            } else {
                              // 可编辑时使用黄色高亮
                              $(td).css('background-color', '#fff3cd');
                            }
                          } else {
                            // 索引15（PdM?列）使用黄色高亮
                            $(td).css('background-color', '#fff3cd');
                          }
                        }
                      },
                    ],
                    pageLength: 100,
                  });
                  // console.log(defaultData);
                  table.clear().draw();
                  table.rows.add(defaultData).draw();

                  // 处理PdM?单选按钮变化事件
                  $("#table tbody").on("change", ".pdm-radio", function () {
                    let $radio = $(this);
                    let rowNode = $radio.closest("tr")[0];
                    let row = table.row(rowNode);
                    let rowData = row.data();
                    let selectedValue = $radio.val();
                    let previousValue = rowData["PdM?"] || "否/ No";
                    
                    // 如果从"否/ No"变为"是/ Yes"，在任务编号后添加" - PdM"后缀
                    if (previousValue !== "是/ Yes" && selectedValue === "是/ Yes") {
                      let taskNo = rowData["Task No"] || "";
                      // 检查是否已经有" - PdM"后缀
                      if (taskNo && !taskNo.endsWith(" - PdM")) {
                        rowData["Task No"] = taskNo + " - PdM";
                      }
                    }
                    
                    // 如果从"是/ Yes"变为"否/ No"，移除任务编号中的" - PdM"后缀
                    if (previousValue === "是/ Yes" && selectedValue !== "是/ Yes") {
                      let taskNo = rowData["Task No"] || "";
                      // 检查是否有" - PdM"后缀
                      if (taskNo && taskNo.endsWith(" - PdM")) {
                        rowData["Task No"] = taskNo.replace(" - PdM", "");
                      }
                    }
                    
                    // 更新行数据
                    rowData["PdM?"] = selectedValue;
                    row.data(rowData).draw(false);
                    
                    // 更新相关列的编辑状态
                    updateEditableCells(rowNode, selectedValue === "是/ Yes");
                  });

                  // 处理Logic下拉框变化事件
                  $("#table tbody").on("change", ".logic-select", function () {
                    let $select = $(this);
                    let rowNode = $select.closest("tr")[0];
                    let row = table.row(rowNode);
                    let rowData = row.data();
                    let selectedValue = $select.val();
                    
                    // 更新行数据
                    rowData["Logic"] = selectedValue;
                    row.data(rowData).draw(false);
                  });

                  // 处理Line Status下拉框变化事件
                  $("#table tbody").on("change", ".line-status-select", function () {
                    let $select = $(this);
                    let rowNode = $select.closest("tr")[0];
                    let row = table.row(rowNode);
                    let rowData = row.data();
                    let selectedValue = $select.val();
                    
                    // 更新行数据
                    rowData["Line Status"] = selectedValue;
                    row.data(rowData).draw(false);
                  });

                  // 处理Resource下拉框变化事件
                  $("#table tbody").on("change", ".resource-select", function () {
                    let $select = $(this);
                    let rowNode = $select.closest("tr")[0];
                    let row = table.row(rowNode);
                    let rowData = row.data();
                    let selectedValue = $select.val();
                    
                    // 更新行数据
                    rowData["Resource"] = selectedValue;
                    row.data(rowData).draw(false);
                  });

                  // 更新可编辑单元格状态的函数
                  function updateEditableCells(rowNode, isEditable) {
                    let row = table.row(rowNode);
                    let rowData = row.data();
                    
                    // 更新行数据中的PdM?值（如果还没有更新）
                    if (rowData["PdM?"] !== (isEditable ? "是/ Yes" : "否/ No")) {
                      rowData["PdM?"] = isEditable ? "是/ Yes" : "否/ No";
                      row.data(rowData);
                    }
                    
                    // 重新绘制行以更新所有列的渲染（包括Logic列的下拉框）
                    row.draw(false);
                  }

                  // 监听表格单元格的双击事件
                  $("#table").on("dblclick", "td", function () {
                    let cell = table.cell(this);
                    let columnIndex = cell.index().column;
                    let rowIndex = cell.index().row;
                    let row = table.row(rowIndex);
                    let rowData = row.data();
                    
                    // 确保rowData存在且是对象
                    if (!rowData || typeof rowData !== 'object') {
                      return;
                    }
                    
                    // 检查是否是Unit、Component、Logic、TagName、LL Limited、HH Limited列（索引16-21）
                    if ([16, 17, 18, 19, 20, 21].indexOf(columnIndex) !== -1) {
                      // 检查PdM?是否为"是/ Yes"
                      let pdmValue = rowData["PdM?"] || "否/ No";
                      let isEditable = pdmValue === "是/ Yes";
                      
                      if (!isEditable) {
                        Swal.fire({
                          title: '无法编辑/ Cannot Edit',
                          text: '请先将"预测性？/ PdM?"设置为"是"才能编辑此列/ Please set "PdM?" to "是" first to edit this column',
                          icon: 'warning',
                          confirmButtonText: '确定/ OK'
                        });
                        return;
                      }
                    }
                    
                    // 如果是Line Status列（索引8），不允许双击编辑（使用下拉框）
                    if (columnIndex === 8) {
                      return;
                    }
                    
                    // 如果是Resource列（索引10），不允许双击编辑（使用下拉框）
                    if (columnIndex === 10) {
                      return;
                    }
                    
                    // 如果是PdM?列（索引15），不允许双击编辑（使用单选按钮）
                    if (columnIndex === 15) {
                      return;
                    }
                    
                    // 如果是Logic列（索引18），不允许双击编辑（使用下拉框）
                    if (columnIndex === 18) {
                      return;
                    }
                    
                    // 获取单元格的原始数据值
                    // 优先从rowData获取原始数据（不受render函数影响）
                    let originalValue = "";
                    let columnKeys = [
                      "MachineType", "Task No", "Section", "Function", "Failure Mode", 
                      "Task Type", "Task Description", "Frecuency", "Line Status", 
                      "Strategy", "Resource", "No Resources", "Skill Level", 
                      "Tools & Equip", "Estimated Time", "PdM?", "Unit", "Component", 
                      "Logic", "TagName", "LL Limited", "HH Limited"
                    ];
                    
                    // 首先从rowData获取原始数据值（这是最可靠的方式）
                    if (columnIndex >= 0 && columnIndex < columnKeys.length && columnKeys[columnIndex]) {
                      originalValue = rowData[columnKeys[columnIndex]] || "";
                    }
                    
                    // 如果rowData中没有值，尝试从单元格的实际DOM内容中提取
                    if (!originalValue || originalValue === "") {
                      let $cell = $(this);
                      
                      // 检查单元格内是否有下拉框
                      let $select = $cell.find('select');
                      if ($select.length > 0) {
                        originalValue = $select.val() || "";
                      } else {
                        // 检查单元格内是否有单选按钮
                        let $radio = $cell.find('input[type="radio"]:checked');
                        if ($radio.length > 0) {
                          originalValue = $radio.val() || "";
                        } else {
                          // 对于普通文本单元格，从单元格的文本内容中提取
                          let cellText = $cell.text().trim();
                          if (cellText) {
                            originalValue = cellText;
                          } else {
                            // 最后尝试从cell.data()获取（可能返回HTML字符串）
                            try {
                              let cellData = cell.data();
                              if (typeof cellData === 'string') {
                                // 如果是HTML字符串，提取文本内容
                                let $temp = $('<div>').html(cellData);
                                originalValue = $temp.text().trim() || "";
                              } else {
                                originalValue = cellData || "";
                              }
                            } catch (e) {
                              originalValue = "";
                            }
                          }
                        }
                      }
                    }
                    
                    // 确保originalValue是字符串类型
                    if (originalValue === null || originalValue === undefined) {
                      originalValue = "";
                    } else {
                      originalValue = String(originalValue);
                    }
                    
                    // 如果值为"请输入"，编辑时显示为空
                    if (originalValue === "请输入") {
                      originalValue = "";
                    }
                    
                    // 检查是否是LL Limited或HH Limited列（索引20, 21），使用数字输入框
                    let isNumberColumn = (columnIndex === 20 || columnIndex === 21);
                    let inputType = isNumberColumn ? 'number' : 'text';
                    let step = isNumberColumn ? 'any' : null;
                    
                    // 转义originalValue中的特殊字符，防止XSS攻击
                    let escapedValue = String(originalValue || "").replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    
                    // 直接在HTML字符串中设置value属性，确保值正确显示
                    // 添加特定的类名以便精确定位
                    let inputHtml = '<input class="form-control editable-input" type="' + inputType + '"' + 
                      (step ? ' step="' + step + '"' : '') + 
                      ' value="' + escapedValue + '">';
                    
                    cell.data(inputHtml).draw();
                    
                    // 等待DOM更新后，聚焦输入框并将光标定位到文本末尾，方便在原有内容基础上编辑
                    setTimeout(function() {
                      // 直接通过单元格节点查找输入框，避免选中其他form-control元素
                      let $cellNode = $(cell.node());
                      let $input = $cellNode.find('input.editable-input');
                      if ($input.length > 0) {
                        $input.focus();
                        // 将光标定位到文本末尾，而不是选中所有文本
                        let length = $input.val().length;
                        if (length > 0) {
                          $input[0].setSelectionRange(length, length);
                        }
                      }
                    }, 10);
                    
                    // 使用事件委托，只处理当前单元格的输入框
                    $(cell.node()).on("blur", "input.editable-input", function () {
                      let newValue = $(this).val();
                      
                      // 如果是数字列，验证输入是否为有效数字
                      if (isNumberColumn && newValue !== "") {
                        // 检查是否为有效数字（包括小数和负数）
                        let numValue = parseFloat(newValue);
                        if (isNaN(numValue)) {
                          Swal.fire({
                            title: '输入错误/ Invalid Input',
                            text: '请输入有效的数字/ Please enter a valid number',
                            icon: 'error',
                            confirmButtonText: '确定/ OK'
                          });
                          cell.data(originalValue).draw();
                          return;
                        }
                        // 保存为数字字符串（保留用户输入的格式）
                        newValue = newValue.trim();
                      }
                      
                      if (newValue !== "") {
                        cell.data(newValue).draw();
                      } else {
                        cell.data(originalValue).draw();
                      }
                    });
                    
                    // 对于数字输入框，添加键盘事件限制
                    if (isNumberColumn) {
                      $(cell.node()).on("keypress", "input.editable-input", function (e) {
                        // 允许数字、小数点、负号、退格、删除、Tab等
                        let char = String.fromCharCode(e.which);
                        if (!/[0-9.\-]/.test(char) && !(e.which === 8 || e.which === 46 || e.which === 9 || e.which === 27 || e.which === 13 || (e.which === 65 && e.ctrlKey === true) || (e.which >= 35 && e.which <= 40))) {
                          e.preventDefault();
                        }
                      });
                    }
                  });

                  $("#submitTasklist").click(() => {
                    Swal.fire({
                      title: "确认？/ Confirm?",
                      text: "是否确认上述信息？/ Do you confirm the above information?",
                      icon: "question",
                      showCancelButton: true,
                      confirmButtonText: "是的/ Yes",
                      cancelButtonText: "取消/ Cancel",
                    }).then((result) => {

                      if (result.isConfirmed) {
                        Swal.fire({
                          title: "请等待/ Please waite",
                          text: "等待服务器返回结果/ Waiting for the serve",
                          icon: "info",
                          allowOutsideClick: false,
                          showConfirmButton: false,
                        });

                        let timestamp = new Date().getTime();

                        date = new Date(timestamp);

                        let year = date.getFullYear();

                        let month = ("0" + (date.getMonth() + 1)).slice(-2);

                        let day = ("0" + date.getDate()).slice(-2);

                        let hours = ("0" + date.getHours()).slice(-2);

                        let minutes = ("0" + date.getMinutes()).slice(-2);

                        let seconds = ("0" + date.getSeconds()).slice(-2);

                        let formattedDate =
                          year +
                          "-" +
                          month +
                          "-" +
                          day +
                          " " +
                          hours +
                          ":" +
                          minutes +
                          ":" +
                          seconds;

                        let rowsData = table.rows().data().toArray();

                        let dataWithoutEmptyCells = [];

                        // console.log("process", $("#process").val());
                        rowsData.forEach((rowData) => {

                          let hasEmptyCell = false;

                          for (let key in rowData) {
                            // console.log(key)
                            if (
                              key === "MachineType" ||
                              key === "Task No" ||
                              key === "Line Status" ||
                              key === "Strategy" ||
                              key === "Resource" ||
                              key === "PdM?" ||
                              key === "Unit" ||
                              key === "Component" ||
                              key === "Logic" ||
                              key === "TagName" ||
                              key === "LL Limited" ||
                              key === "HH Limited"
                            ) {
                              continue; // 跳过特定属性（这些字段可能为空或由下拉框/单选按钮控制）
                            }
                            // console.log(key+':'+rowData[key],rowData[key].length)
                            // 检查值是否存在且不为空
                            if (!rowData[key] || (typeof rowData[key] === 'string' && rowData[key].length == 0)) {
                              hasEmptyCell = true;
                              // console.log(rowData.Strategy)
                              break;
                            }
                          }
                          if (hasEmptyCell === false) {
                            // Strategy列使用全局下拉框，需要从全局获取值
                            rowData.Strategy = $("#Strategy").val();
                            
                            dataWithoutEmptyCells.push(rowData);
                          }
                        });

                        let currentData = JSON.stringify(dataWithoutEmptyCells);

                        let loginInfo =
                          $("#Code").text() +
                          "_" +
                          $("#Name").text() +
                          " " +
                          formattedDate;
                        let reason = "新建/ New";

                        let status = "待审批/ Pending";

                        let dataforHistory = [
                          machineType,
                          currentData,
                          loginInfo,
                          reason,
                          status,
                        ];

                        console.log('dataWithoutEmptyCells', dataWithoutEmptyCells)

                        // --- '班组确认' 检查 `Resource` 字段是否包含非 '技术员' 或 'IDL' 的值 --- //

                        objDatabase.judge_Production_Approval = 'N';

                        for (let i = 0; i < dataWithoutEmptyCells.length; i++) {

                          let resourceValue = dataWithoutEmptyCells[i].Resource.trim();

                          if (!resourceValue.includes('技术员') && !resourceValue.includes('IDL')) {

                            objDatabase.judge_Production_Approval = 'Y';
                            
                            break; // 终止循环，因为只要找到一个不符合条件的就可以确认需要审批
                          }
                        }

                        console.log('objDatabase.judge_Production_Approval', objDatabase.judge_Production_Approval);

                        // --- --- --- //

                        console.log('objDatabase', objDatabase)

                        let data = [objDatabase, dataforHistory, $("#process").val()];

                        google.script.run
                          .withSuccessHandler((r) => {
                            if (r == true) {
                              Swal.close();
                              Swal.fire({
                                title: "操作成功/ Success",
                                icon: "success",
                              });
                            } else {
                              Swal.close();
                              Swal.fire({
                                title: "操作失败/ Fail",
                                icon: "error",
                              });
                            }
                          })
                          .submitRequest(data);

                      }
                    });
                  });
                }
              });
            }
          });
        } else {
          Swal.close();
          Swal.fire({
            title: "加载失败/ Loading Fail",
            icon: "error",
          });
        }
      })
      .getApprovaldata();
  });
</script>
